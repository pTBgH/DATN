## Monitoring & Alerting

### Key Metrics

1. **Credential Update Frequency**
   - Expected: One update every 5 minutes
   - Alert if: No updates for > 10 minutes

2. **File Watcher Health**
   - Check: "credential-watcher remains Running"
   - Alert if: Container restarts frequently

3. **App Readiness**
   - Check: Readiness probe passes
   - Alert if: Readiness probe fails after credential change

### Sample Prometheus Rules

```prometheus
# Alert if no credential updates in 10 minutes
alert: VaultCredentialsStaleness
expr: |
  (time() - vault_credentials_last_updated) > 600
annotations:
  summary: "Vault credentials not updated for > 10 minutes"

# Alert if watcher container restarts
alert: CredentialWatcherCrashes
expr: |
  rate(container_last_seen{pod="identity-service",container="credential-watcher"}[5m]) > 0.1
annotations:
  summary: "Credential watcher restarting frequently"
```

