## Troubleshooting

### Problem: Watcher Not Detecting Changes
**Solution:** Check file permissions
```bash
kubectl exec <pod> -c credential-watcher -- ls -la /vault/secrets/
# Should be readable by container
```

### Problem: App Not Reloading
**Solution:** Check if SIGUSR1 is supported
```bash
# App may not support SIGUSR1, use artisan commands instead
kubectl exec <pod> -c app -- php artisan config:clear
```

### Problem: Database Connections Still Failing
**Solution:** Verify .env merging
```bash
kubectl exec <pod> -c app -- cat /app-secrets/.env
# Should contain DB_USERNAME and DB_PASSWORD
```

