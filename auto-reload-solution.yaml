## Deployment Instructions

### Prerequisites
- kubectl access to the cluster
- Permissions to modify deployments in job7189-apps namespace
- Vault is running and Agent Injector is deployed

### Steps

#### 1. Apply the Auto-Reload Solution

```bash
# Save the following YAML to auto-reload-solution.yaml
# Then apply:
kubectl apply -f auto-reload-solution.yaml

# Or patch existing deployment:
kubectl patch deployment identity-service -n job7189-apps \
  --type merge \
  -p '{"spec":{"template":{"spec":{"containers":[
    {
      "name":"credential-watcher",
      "image":"alpine:3.18",
      ...
    }
  ]}}}}'
```

#### 2. Verify Watcher is Running

```bash
# Check watcher logs
POD=$(kubectl get pods -n job7189-apps -l app=identity-service -o jsonpath='{.items[0].metadata.name}')
kubectl logs -f $POD -n job7189-apps -c credential-watcher
```

#### 3. Test Credential Rotation

```bash
# Force credential rotation (revoke lease)
LEASE_ID=$(kubectl exec vault-0 -n vault -- \
  sh -c "VAULT_SKIP_VERIFY=true VAULT_ADDR=https://127.0.0.1:8200 \
  VAULT_TOKEN=hvs.G6lVKW1xCi7o8j9mTH0u13nD \
  vault read database/creds/identity-service -format=json | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"lease_id\"])'")

kubectl exec vault-0 -n vault -- \
  sh -c "VAULT_SKIP_VERIFY=true VAULT_ADDR=https://127.0.0.1:8200 \
  VAULT_TOKEN=hvs.G6lVKW1xCi7o8j9mTH0u13nD \
  vault lease revoke $LEASE_ID"

# Monitor watcher logs for credential change event
kubectl logs -f $POD -n job7189-apps -c credential-watcher | grep "CREDENTIAL CHANGE"
```

