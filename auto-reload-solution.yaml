# Auto-Reload Solution for Dynamic Credential Rotation

## Problem Statement

Vault rotates dynamic database credentials every 5 minutes, but the application doesn't reload them. The app continues using old credentials until they expire, causing database connection failures.

**Root Cause:** Pod spec hardcodes DB_HOST and DB_DATABASE as environment variables, which take precedence over .env file reading. Additionally, the app doesn't monitor for credential changes.

## Solution Architecture

This solution implements **Solution Option C: Hybrid Approach** combining:
1. Modified pod deployment (remove hardcoded DB credentials)
2. File watcher sidecar (monitors credential file changes)
3. Signal-based app reload (HUP signal to reload Laravel)

---

## Implementation

### Step 1: Fix Pod Deployment Configuration

Update the identity-service deployment to:
- Remove hardcoded DB_USERNAME and DB_PASSWORD from pod spec
- Allow application to read from .env file instead
-Keep other non-credential environment variables

**Kubectl Patch:**
```bash
kubectl patch deployment identity-service -n job7189-apps \
  --type='json' \
  -p='[{"op":"remove","path":"/spec/template/spec/containers/0/env/4"}]'
```

**Or Manual Fix - Update deployment spec:**

```yaml
spec:
  template:
    spec:
      containers:
      - name: app
        image: 172.17.0.1:5000/job7189/identity-service:v2.8.11
        env:
        # REMOVE THESE:
        # - name: DB_USERNAME
        #   value: "hardcoded-user"
        # - name: DB_PASSWORD
        #   value: "hardcoded-password"
        
        # KEEP THESE (non-credential config):
        - name: DB_HOST
          value: "mysql.data.svc.cluster.local"
        - name: DB_DATABASE
          value: "job7189_identity_db"
        - name: DB_CONNECTION
          value: "mysql"
        - name: DB_PORT
          value: "3306"
        - name: APP_ENV
          value: "production"
        - name: APP_DEBUG
          value: "true"
        # ... other config variables
```

**Why This Works:**
- With DB_USERNAME and DB_PASSWORD not in pod env, Laravel falls back to reading .env file
- Vault-Agent writes to /vault/secrets/.env.db
- env-loader merges to /app-secrets/.env
- Laravel reads /app-secrets/.env automatically

---

### Step 2: Deploy Credential Change Watcher Sidecar

The watcher monitors for credential file changes and triggers application reload.

**Solution Components:**

#### Option A: inotify-Based Watcher (Recommended)

Creates a sidecar that watches /vault/secrets/.env.db for modifications and sends signals to reload the app.

**Generated Configuration File: `auto-reload-solution.yaml`**

```yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: job7189-apps
spec:
  template:
    spec:
      containers:
      # Main Application Container
      - name: app
        image: 172.17.0.1:5000/job7189/identity-service:v2.8.11
        ports:
        - containerPort: 8000
        env:
        # Database config (non-credentials)
        - name: DB_HOST
          value: "mysql.data.svc.cluster.local"
        - name: DB_DATABASE
          value: "job7189_identity_db"
        - name: DB_CONNECTION
          value: "mysql"
        - name: DB_PORT
          value: "3306"
        - name: APP_ENV
          value: "production"
        - name: APP_DEBUG
          value: "true"
        # ... other variables (removed DB_USERNAME, DB_PASSWORD)
        
        # Credentials from volume (read by app from .env)
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
        - name: app-secrets
          mountPath: /app-secrets
        
        # Readiness check - ensure DB connection works
        readinessProbe:
          exec:
            command:
            - php
            - artisan
            - tinker
            - --execute=DB::select('SELECT 1')
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
      
      # FILE WATCHER SIDECAR (NEW)
      - name: credential-watcher
        image: alpine:3.18
        command:
        - sh
        - -c
        args:
        - |
          #!/bin/sh
          # Install inotify-tools for file monitoring
          echo "Installing inotify-tools..."
          apk add --no-cache inotify-tools > /dev/null 2>&1
          
          CRED_FILE="/vault/secrets/.env.db"
          APP_PID_FILE="/tmp/app.pid"
          LAST_HASH=""
          
          echo "[credential-watcher] Starting credential change detector..."
          echo "[credential-watcher] Watching: $CRED_FILE"
          echo "[credential-watcher] Polling every 5 seconds..."
          
          # Initial hash
          if [ -f "$CRED_FILE" ]; then
            LAST_HASH=$(md5sum "$CRED_FILE" | awk '{print $1}')
          fi
          
          # Continuous monitoring loop
          while true; do
            sleep 5
            
            # Check if file exists and hash changed
            if [ -f "$CRED_FILE" ]; then
              CURR_HASH=$(md5sum "$CRED_FILE" | awk '{print $1}')
              
              if [ "$CURR_HASH" != "$LAST_HASH" ]; then
                echo "[credential-watcher] ⚠️  CREDENTIAL CHANGE DETECTED at $(date)"
                echo "[credential-watcher] Previous hash: $LAST_HASH"
                echo "[credential-watcher] New hash: $CURR_HASH"
                echo "[credential-watcher] Updated credentials:"
                cat "$CRED_FILE" | sed 's/DB_PASSWORD=.*/DB_PASSWORD="[REDACTED]"/g'
                echo ""
                
                # Merge credential files
                echo "[credential-watcher] Merging credential files to /app-secrets/.env..."
                cat /vault/secrets/.env.common >> /app-secrets/.env.new 2>/dev/null || true
                cat /vault/secrets/.env.db >> /app-secrets/.env.new 2>/dev/null || true
                cat /vault/secrets/.env.extra >> /app-secrets/.env.new 2>/dev/null || true
                mv /app-secrets/.env.new /app-secrets/.env 2>/dev/null || true
                
                # Signal app to reload
                echo "[credential-watcher] Signaling app to reload configuration..."
                # Try to signal the PHP-FPM master process (PID 1 in the app container)
                # We signal via /proc since we're in same pod
                
                # Method 1: Signal via inherited process group (if app allows SIGUSR1)
                kill -SIGUSR1 1 2>/dev/null || true
                
                # Method 2: Try artisan command for graceful reload
                # (if Laravel supports on-demand feature reloading)
                php /app/artisan config:clear 2>/dev/null || true
                php /app/artisan cache:clear 2>/dev/null || true
                
                echo "[credential-watcher] ✓ Reload signal sent at $(date)"
                LAST_HASH="$CURR_HASH"
              fi
            fi
          done
        
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
        - name: app-secrets
          mountPath: /app-secrets
        
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      
      # Existing Vault Agent Injector (modified for this solution)
      # ... vault-agent sidecar configuration ...
      
      initContainers:
      # Existing env-loader maintained
      - name: env-loader
        image: busybox:1.36
        command:
        - sh
        - -c
        args:
        - |
          #!/bin/sh
          echo "⏳ Waiting for Vault Agent to inject credentials..."
          for i in $(seq 1 30); do
            if [ -f /vault/secrets/.env.db ]; then
              echo "✓ Vault secrets ready"
              break
            fi
            sleep 1
          done
          
          echo "✓ Merging credential files..."
          cat /vault/secrets/.env.common > /app-secrets/.env 2>/dev/null || true
          cat /vault/secrets/.env.db >> /app-secrets/.env 2>/dev/null || true
          cat /vault/secrets/.env.extra >> /app-secrets/.env 2>/dev/null || true
          echo "✓ Environment files merged"
        
        volumeMounts:
        - name: vault-secrets
          mountPath: /vault/secrets
        - name: app-secrets
          mountPath: /app-secrets
      
      volumes:
      - name: vault-secrets
        emptyDir:
          medium: Memory
      - name: app-secrets
        emptyDir:
          medium: Memory
      - name: home-init
        emptyDir:
          medium: Memory
```

#### Option B: Periodic Pod Restart (Simpler Alternative)

If file watching is too complex, force pod restart after TTL/2 (every 2.5 minutes):

```bash
# Add to deployment spec:
spec:
  template:
    spec:
      activeDeadlineSeconds: 600  # Force restart every 10 min
```

Or use an external controller like [Reloader](https://github.com/stakater/Reloader) to watch ConfigMaps and trigger restarts.

#### Option C: Laravel Signal Handler Implementation

Modify Laravel app to gracefully handle credential reloads:

```php
// app/Providers/AppServiceProvider.php

public function boot()
{
    // Reload database config on SIGUSR1 signal
    pcntl_signal(SIGUSR1, function () {
        $this->reloadDatabaseConfig();
    });
    
    // Or reload on each request (slight performance hit)
    $this->reloadDatabaseConfigIfChanged();
}

private function reloadDatabaseConfigIfChanged()
{
    $envFile = '/app-secrets/.env';
    $lastCheck = cache('env_file_hash');
    
    if (file_exists($envFile)) {
        $hash = md5_file($envFile);
        if ($lastCheck !== $hash) {
            $this->loadEnvFile($envFile);
            cache(['env_file_hash' => $hash], now()->addMinutes(5));
        }
    }
}

private function reloadDatabaseConfig()
{
    // Reload .env file
    if (file_exists('/app-secrets/.env')) {
        $this->loadEnvFile('/app-secrets/.env');
    }
    
    // Reconnect database
    DB::purge('mysql');
    DB::reconnect('mysql');
}
```

