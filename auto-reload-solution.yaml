## Production Rollout

### Phase 1: Development
- Deploy to dev cluster
- Test credential rotation manually
- Monitor logs for 24 hours

### Phase 2: Staging
- Deploy to staging with all services
- Run integration tests with credential rotation
- Load test with dynamic credentials

### Phase 3: Production
- Gradual rollout (1 pod → 3 pods)
- Monitor database connection metrics
- Have rollback plan (remove watcher, restore old .env config)

### Rollback Plan
```bash
# If issues occur, revert to static credentials
kubectl patch deployment identity-service -n job7189-apps \
  --type json \
  -p='[{"op":"remove","path":"/spec/template/spec/containers/1"}]'  # Remove watcher

# And restore hardcoded DB credentials in pod spec
```

