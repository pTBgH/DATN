## Expected Behavior After Implementation

### Timeline

```
T=0s   : Vault issues credentials (TTL: 5m)
         Credentials written to /vault/secrets/.env.db

T=5m   : Vault credential lease expires
         Vault issues NEW credentials
         Vault Agent polls and refreshes /vault/secrets/.env.db

T=5m1s : Credential Watcher detects file change (hash differs)
         ✓ Logs: "[credential-watcher] CREDENTIAL CHANGE DETECTED"
         
T=5m2s : Watcher merges .env files
         Watcher sends SIGUSR1 to app (PID 1)
         
T=5m3s : PHP-FPM reloads configuration
         Database connection pool purged
         APP reconnects with NEW credentials
         
T=5m4s : Application continues working with NEW credentials
         No downtime, no errors
```

### Verification

After deployment, test with this sequence:

```bash
# 1. Check watcher is running
kubectl get pods -n job7189-apps -l app=identity-service

# 2. Force credential change
vault lease revoke <current_lease_id>

# 3. Verify watcher detects change
kubectl logs <pod> -c credential-watcher | tail -20

# 4. Confirm app still works
kubectl exec <pod> -c app -- php artisan tinker --execute="DB::select('SELECT 1')"
```

