apiVersion: v1
kind: Pod
metadata:
  name: disk-cleaner-srv05
  namespace: kube-system
spec:
  nodeName: 7189srv05
  priorityClassName: system-node-critical
  tolerations:
  - key: "node.kubernetes.io/disk-pressure"
    operator: "Exists"
    effect: "NoSchedule"
  containers:
  - name: cleaner
    image: alpine
    command:
    - /bin/sh
    - -c
    - |
      echo "=== BEFORE CLEANUP ==="
      df -h /host
      
      echo "=== CLEANING SYSTEMD JOURNAL LOGS ==="
      rm -rf /host/var/log/journal/*
      
      echo "=== CLEANING ROTATED AND OLD LOGS ==="
      find /host/var/log -type f -name "*.gz" -delete
      find /host/var/log -type f -name "*.1" -delete
      find /host/var/log -type f -name "*.log" -size +50M -exec truncate -s 0 {} \;
      
      echo "=== AFTER CLEANUP ==="
      df -h /host
    volumeMounts:
    - name: host-root
      mountPath: /host
  volumes:
  - name: host-root
    hostPath:
      path: /
  restartPolicy: Never
