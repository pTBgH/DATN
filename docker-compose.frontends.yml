version: '3.8'

services:
  fe-candidate:
    build:
      context: ./src/fe_candidate
      dockerfile: Dockerfile
    image: localhost:5000/fe-candidate:latest
    container_name: fe-candidate
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:8080
      - NEXT_PUBLIC_KEYCLOAK_REALM=job7189
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=fe-candidate
    networks:
      - job7189

  fe-recruiter:
    build:
      context: ./src/fe_recruiter
      dockerfile: Dockerfile
    image: localhost:5000/fe-recruiter:latest
    container_name: fe-recruiter
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_PUBLIC_KEYCLOAK_URL=http://localhost:8080
      - NEXT_PUBLIC_KEYCLOAK_REALM=job7189
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=fe-recruiter
    networks:
      - job7189

networks:
  job7189:
    driver: bridge
