apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    k8s-app: filebeat
  name: filebeat-config
  namespace: monitoring
data:
  filebeat.yml: |
    filebeat.inputs:
    - type: container
      paths:
        - /var/log/containers/*.log
      
      processors:
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
            - logs_path:
                logs_path: "/var/log/containers/"
        
        # Chỉ lấy log của namespace job7189-ns
        - drop_event:
            when:
              not:
                or:
                  - equals:
                      kubernetes.namespace: "job7189-apps"
                  - equals:
                      kubernetes.namespace: "gateway"
                  - equals:
                      kubernetes.namespace: "security"
                  - equals:
                      kubernetes.namespace: "data"

    output.elasticsearch:
      hosts: ['elasticsearch:9200']
      index: "filebeat-%{[agent.version]}-%{+yyyy.MM.dd}"

    setup.kibana:
      host: "kibana:5601"

    setup.template.enabled: false
    setup.ilm.enabled: false
