name = "job7189-frontend"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# When deploying:
#   1. npm run pages:build      # produces .vercel/output/static via @cloudflare/next-on-pages
#   2. wrangler pages deploy    # uploads the static + worker bundle to Cloudflare Pages
#
# Public env vars (NEXT_PUBLIC_*) must be set BEFORE pages:build because Next.js
# inlines them at build time. Server-only env vars (KEYCLOAK_CLIENT_SECRET,
# NEXTAUTH_SECRET) should be configured via the Cloudflare Pages dashboard or:
#   wrangler pages secret put NEXTAUTH_SECRET --project-name job7189-frontend
