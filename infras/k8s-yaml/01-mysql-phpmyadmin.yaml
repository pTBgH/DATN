# --- 1. Cấu hình MySQL (ConfigMap - Bật Binlog cho Kafka) ---
apiVersion: v1
kind: ConfigMap
metadata:
  ---
  # --- 3. MySQL ServiceAccount (for Vault Kubernetes auth) ---
  apiVersion: v1
  kind: ServiceAccount
  metadata:
    name: mysql
    namespace: data

  ---
  # --- 4. MySQL Deployment (Vault-init initContainer writes root password into shared emptyDir) ---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: mysql
    namespace: data
  spec:
    selector:
      matchLabels:
        app: mysql
    template:
      metadata:
        labels:
          app: mysql
      spec:
        serviceAccountName: mysql
        initContainers:
        - name: vault-init
          image: hashicorp/vault:1.17.6
          command:
            - "/bin/sh"
            - "-c"
            - |
              set -e
              export VAULT_ADDR=https://vault.vault.svc.cluster.local:8200
              export VAULT_SKIP_VERIFY=true
              # Authenticate using Kubernetes auth and write root password to shared volume
              vault login -method=kubernetes role=mysql jwt=@/var/run/secrets/kubernetes.io/serviceaccount/token >/dev/null 2>&1 || exit 2
              vault kv get -field=root-password secret/mysql > /vault/secrets/mysql-root-password
              chmod 600 /vault/secrets/mysql-root-password
          volumeMounts:
          - name: vault-secret
            mountPath: /vault/secrets
        containers:
        - name: mysql
          image: mysql:8.0
          # The main container reads the root password from the file written by the initContainer
          command:
            - "/bin/sh"
            - "-c"
            - |
              export MYSQL_ROOT_PASSWORD=$(cat /vault/secrets/mysql-root-password)
              exec docker-entrypoint.sh mysqld
          env:
          - name: MYSQL_DATABASE
            value: job7189keycloak
          ports:
          - containerPort: 3306
          volumeMounts:
          - name: mysql-storage
            mountPath: /var/lib/mysql
          - name: mysql-config-volume
            mountPath: /etc/mysql/conf.d
          - name: mysql-init-scripts
            mountPath: /docker-entrypoint-initdb.d
          - name: vault-secret
            mountPath: /vault/secrets
        volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: mysql-config-volume
          configMap:
            name: mysql-config
        - name: mysql-init-scripts
          configMap:
            name: mysql-init-databases
        - name: vault-secret
          emptyDir: {}
              # Use a narrow, namespaced secret created during bootstrap by the Vault pipeline
              # (or created manually). Do NOT rely on the cluster-wide `app-secrets` for root.
              name: mysql-root
              key: mysql-root-password
        - name: MYSQL_DATABASE
          value: job7189keycloak
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        # Mount file cấu hình vào đây để MySQL đọc
        - name: mysql-config-volume
          mountPath: /etc/mysql/conf.d
        # ZTA: Init scripts create empty databases only (no credentials)
        - name: mysql-init-scripts
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
      # Lấy file cấu hình từ ConfigMap ở trên
      - name: mysql-config-volume
        configMap:
          name: mysql-config
      # ZTA: Database initialization (empty databases only)
      - name: mysql-init-scripts
        configMap:
          name: mysql-init-databases

---
# --- 4. MySQL Service (Nội bộ) ---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: data
spec:
  ports:
  - port: 3306
  selector:
    app: mysql

---
# --- 5.1. Cấu hình PHP cho phpMyAdmin ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: phpmyadmin-config
  namespace: management
data:
  upload.ini: |
    upload_max_filesize = 500M
    post_max_size = 500M
    max_execution_time = 600
    max_input_time = 600
    memory_limit = 512M

---
# --- 5.2. phpMyAdmin Deployment (Cập nhật) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
  namespace: management
spec:
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
    spec:
      containers:
      - name: phpmyadmin
        image: phpmyadmin/phpmyadmin:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: PMA_HOST
          value: "mysql.data.svc.cluster.local"
        - name: PMA_PORT
          value: "3306"
        # Thêm biến môi trường để PHP đọc file cấu hình
        - name: PHP_INI_SCAN_DIR
          value: "/usr/local/etc/php/conf.d:/etc/php/conf.d"
        ports:
        - containerPort: 80
        # Mount file cấu hình PHP
        volumeMounts:
        - name: php-config
          mountPath: /usr/local/etc/php/conf.d/upload.ini
          subPath: upload.ini
      volumes:
      - name: php-config
        configMap:
          name: phpmyadmin-config

---
# --- 6. phpMyAdmin Service (Ra ngoài) ---
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin
  namespace: management
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
  selector:
    app: phpmyadmin
