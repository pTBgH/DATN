# ==========================================
# Keycloak Deployment — ZTA Compliant
# ==========================================
# SECURITY (ZTA):
#   - DB password read from Kubernetes Secret 'app-secrets' (generated at deploy time)
#   - Admin password read from Kubernetes Secret 'app-secrets' (generated at deploy time)
#   - NO hardcoded credentials in this file
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
      # Chờ MySQL thực sự ready — check TCP port, không check theo thời gian
      - name: wait-for-mysql
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for MySQL..."
          until nc -z mysql.data.svc.cluster.local 3306; do
            echo "MySQL not ready, retrying in 3s..."
            sleep 3
          done
          echo "MySQL is ready!"

      containers:
      - name: keycloak
        image: keycloak-custom:v1.0
        imagePullPolicy: IfNotPresent
        command: ["/opt/keycloak/bin/kc.sh", "start-dev", "--import-realm"]       
        env:
        - name: KC_DB
          value: mysql
        - name: KC_DB_URL
          value: "jdbc:mysql://mysql.data.svc.cluster.local:3306/job7189keycloak"
        # ZTA: DB credentials from Kubernetes Secret (generated at deploy time)
        - name: KC_DB_USERNAME
          value: root
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: mysql-root-password
        - name: KEYCLOAK_ADMIN
          value: admin
        # ZTA: Admin password from Kubernetes Secret (generated at deploy time)
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: keycloak-admin-password
        - name: KC_HTTP_ENABLED
          value: "true"
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HOSTNAME_STRICT_HTTPS
          value: "false"
        
        # Thêm biến này để bật API kiểm tra sức khoẻ của Keycloak
        - name: KC_HEALTH_ENABLED
          value: "true"
        
        ports:
        - containerPort: 8080
        
        # Keycloak khởi động rất chậm (~60s) — readinessProbe để Nginx
        # không nhận traffic trước khi Keycloak thực sự sẵn sàng
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 20
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: security
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: keycloak
