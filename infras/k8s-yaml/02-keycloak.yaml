# ==========================================
# Keycloak Deployment — ZTA Compliant
# ==========================================
# SECURITY (ZTA):
#   - DB password read from Kubernetes Secret 'app-secrets' (generated at deploy time)
#   - Admin password read from Kubernetes Secret 'app-secrets' (generated at deploy time)
#   - NO hardcoded credentials in this file
# ==========================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: keycloak
  namespace: security

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: security
  labels:
    zta.job7189/role: sso
    zta.job7189/tier: T1
    zta.job7189/env: prod
    zta.job7189/data-classification: confidential
    zta.job7189/exposure: internal
    zta.job7189/team: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
        zta.job7189/role: sso
        zta.job7189/tier: T1
        zta.job7189/env: prod
        zta.job7189/data-classification: confidential
        zta.job7189/exposure: internal
        zta.job7189/team: security
    spec:
      serviceAccountName: keycloak
      initContainers:
      # Chờ MySQL thực sự ready — check TCP port, không check theo thời gian
      - name: wait-for-mysql
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          MAX_TRIES=60
          TRY=0
          echo "Waiting for MySQL..."
          until nc -z mysql.data.svc.cluster.local 3306; do
            TRY=$((TRY+1))
            if [ "$TRY" -ge "$MAX_TRIES" ]; then
              echo "ERROR: MySQL did not become reachable within $((MAX_TRIES*3))s" >&2
              exit 1
            fi
            echo "MySQL not ready, retrying in 3s..."
            sleep 3
          done
          echo "MySQL is ready!"

      containers:
      - name: keycloak
        image: 172.17.0.1:5000/job7189/keycloak-custom:v1.0
        imagePullPolicy: Always
        command: ["/opt/keycloak/bin/kc.sh", "start-dev", "--import-realm"]       
        env:
        - name: KC_DB
          value: mysql
        - name: KC_DB_URL
          value: "jdbc:mysql://mysql.data.svc.cluster.local:3306/job7189keycloak"
        # ZTA: DB credentials from Kubernetes Secret (generated at deploy time)
        - name: KC_DB_USERNAME
          value: root
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: mysql-root-password
        - name: KEYCLOAK_ADMIN
          value: admin
        # ZTA: Admin password from Kubernetes Secret (generated at deploy time)
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: keycloak-admin-password
        - name: KC_HTTP_ENABLED
          value: "true"
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HOSTNAME_STRICT_HTTPS
          value: "false"

        # ── Hostname config cho split-URL OIDC (PR #19) ──────────────────────
        # KC_HOSTNAME_URL thay thế KC_HOSTNAME — set full base URL bao gồm
        # scheme + host (KHÔNG port) → issuer trong JWT = http://auth.job7189.local/...
        # QUAN TRỌNG: KHÔNG set KC_HOSTNAME cùng lúc với KC_HOSTNAME_URL
        #   (Keycloak 22.x sẽ refuse khởi động nếu có cả hai)
        # - name: KC_HOSTNAME_URL
        #   value: "http://auth.job7189.local"
        # - name: KC_HOSTNAME_ADMIN_URL
        #   value: "http://auth.job7189.local"
        - name: KC_HOSTNAME_STRICT_BACKCHANNEL
          value: "false"

        # Bật API kiểm tra sức khoẻ của Keycloak
        - name: KC_HEALTH_ENABLED
          value: "true"
        
        ports:
        - containerPort: 8080

        # Keycloak Quarkus-based runtime cần chạy bước "Updating the
        # configuration and installing your custom providers" trước khi listener
        # /health/ready khả dụng. Trên CPU bị contend (ZTA full enforcement
        # chạy cùng Cosign + Tetragon + SPIRE + Cilium-operator), bước này có
        # thể tốn 3–8 phút. startupProbe nới window ra 10 phút để liveness
        # probe không kill container giữa chừng. Sau khi startupProbe pass,
        # readiness/liveness mới được kích hoạt.
        startupProbe:
          httpGet:
            path: /health/ready
            port: 8080
          failureThreshold: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 6
        resources:
          requests:
            cpu: "200m"
            memory: "768Mi"
          limits:
            cpu: "1500m"
            memory: "1536Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: security
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: keycloak
