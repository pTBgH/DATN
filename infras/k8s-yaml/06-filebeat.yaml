apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: monitoring
  labels:
    k8s-app: filebeat
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
  labels:
    k8s-app: filebeat
rules:
- apiGroups: [""] # "" indicates the core API group
  resources:
  - namespaces
  - pods
  - nodes
  verbs:
  - get
  - watch
  - list
- apiGroups: ["apps"]
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
- kind: ServiceAccount
  name: filebeat
  namespace: monitoring
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io
---
# ==========================================
# PHẦN BẠN ĐANG THIẾU: CONFIGMAP
# ==========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: monitoring
  labels:
    k8s-app: filebeat
data:
  filebeat.yml: |-
    filebeat.inputs:
    - type: container
      paths:
        - /var/log/containers/*.log
      
      processors:
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
            - logs_path:
                logs_path: "/var/log/containers/"
        
        # Whitelist: drop everything except these namespaces.
        # security-cdm is whitelisted so the threat-intel-refresh
        # CronJob output (FireHOL CIDR / URLhaus FQDN feed counts +
        # ConfigMap / CiliumCIDRGroup / coredns-sinkhole patch results)
        # is shipped to ES for audit lineage.  See
        # doc/zta-gap-decision.md § 0.4.
        - drop_event:
            when:
              not:
                or:
                  - equals:
                      kubernetes.namespace: "job7189-apps"
                  - equals:
                      kubernetes.namespace: "gateway"
                  - equals:
                      kubernetes.namespace: "security"
                  - equals:
                      kubernetes.namespace: "data"
                  - equals:
                      kubernetes.namespace: "security-cdm"

    output.elasticsearch:
      hosts: ['elasticsearch:9200']
      # Default index for all whitelisted log streams.  The `indices`
      # block below overrides this on a per-document basis using
      # conditions evaluated against the document's Kubernetes
      # metadata (added by the add_kubernetes_metadata processor).
      # First matching rule wins; if none match, the default `index`
      # above is used.
      index: "filebeat-%{[agent.version]}-%{+yyyy.MM.dd}"
      indices:
        - index: "threat-intel-feed-%{+yyyy.MM.dd}"
          when.equals:
            kubernetes.labels.app: "threat-intel-refresh"

    setup.kibana:
      host: "kibana:5601"

    setup.template.enabled: false
    setup.ilm.enabled: false
---
# ==========================================
# DAEMONSET (Phần chạy Filebeat)
# ==========================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: monitoring
  labels:
    k8s-app: filebeat
    zta.job7189/role: scraper
    zta.job7189/tier: T2
    zta.job7189/env: prod
    zta.job7189/data-classification: none
    zta.job7189/exposure: cluster-only
    zta.job7189/team: platform
spec:
  selector:
    matchLabels:
      k8s-app: filebeat
  template:
    metadata:
      labels:
        k8s-app: filebeat
        zta.job7189/role: scraper
        zta.job7189/tier: T2
        zta.job7189/env: prod
        zta.job7189/data-classification: none
        zta.job7189/exposure: cluster-only
        zta.job7189/team: platform
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: filebeat
        image: docker.elastic.co/beats/filebeat:7.17.18
        args: [
          "-c", "/etc/filebeat.yml",
          "-e",
        ]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          runAsUser: 0
        resources:
          limits:
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 100Mi
        volumeMounts:
        - name: config
          mountPath: /etc/filebeat.yml
          readOnly: true
          subPath: filebeat.yml
        - name: data
          mountPath: /usr/share/filebeat/data
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: varlog
          mountPath: /var/log
          readOnly: true
      volumes:
      - name: config
        configMap:
          defaultMode: 0640
          name: filebeat-config # Nó tìm cái ConfigMap ở trên
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: varlog
        hostPath:
          path: /var/log
      - name: data
        hostPath:
          path: /var/lib/filebeat-data
          type: DirectoryOrCreate