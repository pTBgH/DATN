apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: monitoring
  labels:
    k8s-app: filebeat
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
  labels:
    k8s-app: filebeat
rules:
- apiGroups: [""] # "" indicates the core API group
  resources:
  - namespaces
  - pods
  - nodes
  verbs:
  - get
  - watch
  - list
- apiGroups: ["apps"]
  resources:
  - replicasets
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
- kind: ServiceAccount
  name: filebeat
  namespace: monitoring
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io
---
# ==========================================
# PHẦN BẠN ĐANG THIẾU: CONFIGMAP
# ==========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: monitoring
  labels:
    k8s-app: filebeat
data:
  filebeat.yml: |-
    filebeat.inputs:
    - type: container
      paths:
        - /var/log/containers/*.log
      
      processors:
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
            - logs_path:
                logs_path: "/var/log/containers/"
        
        # Whitelist: drop everything except these namespaces.
        #
        # Sections:
        #   (A) Application + gateway + IdP/PDP/PIP — the originally
        #       whitelisted core ZTA path.
        #   (B) Auxiliary PEP/PIP infrastructure — every ZTA control
        #       plane that emits enforcement decisions (Vault audit
        #       log, SPIRE SVID issuance, OPA Gatekeeper admission
        #       denials, cosign image-signature rejections, cert-manager
        #       cert issuance, ingress-nginx edge access).  Without
        #       these in ES we lose the audit trail required by
        #       NIST SP 800-207 §3.4.4 (centralized PDP/PEP log).
        #   (C) `kube-system` selectively, ONLY for the eBPF data-plane
        #       PEPs (Cilium agent + operator, Tetragon, Hubble).
        #       The rest of kube-system (etcd / apiserver / controller-
        #       manager / scheduler / coredns / metrics-server / local-
        #       path-provisioner) is excluded to keep volume bounded —
        #       those are Kubernetes platform logs, not ZTA decisions.
        #
        # security-cdm is whitelisted so the threat-intel-refresh
        # CronJob output (FireHOL CIDR / URLhaus FQDN feed counts +
        # ConfigMap / CiliumCIDRGroup / coredns-sinkhole patch results)
        # is shipped to ES for audit lineage.  See
        # knowledge-base/zta-gap-decision.md § 0.4.
        - drop_event:
            when:
              not:
                or:
                  # (A) Core ZTA path — applications + gateway + IdP/PDP/PIP
                  - equals:
                      kubernetes.namespace: "job7189-apps"
                  - equals:
                      kubernetes.namespace: "gateway"
                  - equals:
                      kubernetes.namespace: "security"
                  - equals:
                      kubernetes.namespace: "data"
                  - equals:
                      kubernetes.namespace: "security-cdm"
                  # (B) Auxiliary PEP / PIP infrastructure
                  #     vault          — Vault audit log + agent-injector
                  #                      decisions (JIT DB cred issuance,
                  #                      role bindings).
                  #     spire          — SPIRE server + agent SVID issuance
                  #                      (workload identity, ZTA pillar 1).
                  #     gatekeeper-system
                  #                    — OPA Gatekeeper admission deny
                  #                      events (label drift, image policy).
                  #     cosign-system  — Sigstore policy-controller image-
                  #                      signature verification denials.
                  #     cert-manager   — cert issuance + renewal events
                  #                      (mTLS certs for internal services).
                  #     ingress-nginx  — edge L7 access log (entry point
                  #                      before Kong, useful for triaging
                  #                      requests that never reach Kong).
                  - equals:
                      kubernetes.namespace: "vault"
                  - equals:
                      kubernetes.namespace: "spire"
                  - equals:
                      kubernetes.namespace: "gatekeeper-system"
                  - equals:
                      kubernetes.namespace: "cosign-system"
                  - equals:
                      kubernetes.namespace: "cert-manager"
                  - equals:
                      kubernetes.namespace: "ingress-nginx"
                  # (C) kube-system — selective by pod-name prefix so we
                  #     only ship the eBPF-driven ZTA data-plane PEPs
                  #     (Cilium L3-7 drops, Tetragon process events,
                  #     Hubble flow exporter) and skip the Kubernetes
                  #     control-plane noise (etcd / apiserver / coredns
                  #     / kube-scheduler / metrics-server etc.).
                  #
                  #     Pod-name prefix is used rather than label match
                  #     because the upstream Tetragon Helm chart uses
                  #     the key `app.kubernetes.io/name` which Filebeat
                  #     7.x re-encodes (`.` → `_`) and the encoded key
                  #     varies by `add_kubernetes_metadata.labels.dedot`
                  #     setting.  Pod-name prefix is stable across
                  #     Filebeat versions and chart upgrades.
                  - and:
                      - equals:
                          kubernetes.namespace: "kube-system"
                      - regexp:
                          kubernetes.pod.name: "^(cilium|hubble|tetragon)"

    output.elasticsearch:
      hosts: ['elasticsearch:9200']
      # Default index for all whitelisted log streams.  The `indices`
      # block below overrides this on a per-document basis using
      # conditions evaluated against the document's Kubernetes
      # metadata (added by the add_kubernetes_metadata processor).
      # First matching rule wins; if none match, the default `index`
      # above is used.
      index: "filebeat-%{[agent.version]}-%{+yyyy.MM.dd}"
      indices:
        - index: "threat-intel-feed-%{+yyyy.MM.dd}"
          when.equals:
            kubernetes.labels.app: "threat-intel-refresh"

    setup.kibana:
      host: "kibana:5601"

    setup.template.enabled: false
    setup.ilm.enabled: false
---
# ==========================================
# DAEMONSET (Phần chạy Filebeat)
# ==========================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: monitoring
  labels:
    k8s-app: filebeat
    zta.job7189/role: scraper
    zta.job7189/tier: T2
    zta.job7189/env: prod
    zta.job7189/data-classification: none
    zta.job7189/exposure: cluster-only
    zta.job7189/team: platform
spec:
  selector:
    matchLabels:
      k8s-app: filebeat
  template:
    metadata:
      labels:
        k8s-app: filebeat
        zta.job7189/role: scraper
        zta.job7189/tier: T2
        zta.job7189/env: prod
        zta.job7189/data-classification: none
        zta.job7189/exposure: cluster-only
        zta.job7189/team: platform
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: filebeat
        image: docker.elastic.co/beats/filebeat:7.17.18
        args: [
          "-c", "/etc/filebeat.yml",
          "-e",
        ]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          runAsUser: 0
        resources:
          limits:
            memory: 500Mi
          requests:
            cpu: 100m
            memory: 250Mi
        volumeMounts:
        - name: config
          mountPath: /etc/filebeat.yml
          readOnly: true
          subPath: filebeat.yml
        - name: data
          mountPath: /usr/share/filebeat/data
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: varlog
          mountPath: /var/log
          readOnly: true
      volumes:
      - name: config
        configMap:
          defaultMode: 0640
          name: filebeat-config # Nó tìm cái ConfigMap ở trên
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: varlog
        hostPath:
          path: /var/log
      - name: data
        hostPath:
          path: /var/lib/filebeat-data
          type: DirectoryOrCreate