# --- 1. Ổ cứng cho MinIO ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: job7189-infra
spec:
  accessModes: [ "ReadWriteOnce" ]
  resources:
    requests:
      storage: 10Gi

---
# --- 2. MinIO StatefulSet ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: job7189-infra
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
        - server
        - /data
        - --console-address
        - ":9001"
        ports:
        - containerPort: 9000 # API S3
        - containerPort: 9001 # Console UI
        env:
        # User/Pass đăng nhập (Thay đổi tùy ý)
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-pvc

---
# --- 3. MinIO Service (Nội bộ & NodePort) ---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: job7189-infra
spec:
  type: NodePort
  ports:
  - name: api
    port: 9000
    targetPort: 9000
    nodePort: 30900 # API S3: http://IP:30900
  - name: console
    port: 9001
    targetPort: 9001
    nodePort: 30901 # Web UI: http://IP:30901
  selector:
    app: minio