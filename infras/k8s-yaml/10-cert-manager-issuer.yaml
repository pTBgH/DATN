# ==========================================
# CERT-MANAGER — Self-signed CA cho Vault
# ==========================================
# Flow:
# 1. SelfSigned Issuer → tạo root CA certificate
# 2. Root CA Certificate → lưu vào Secret vault-ca
# 3. CA Issuer (dùng vault-ca) → cấp cert cho Vault server
# 4. Vault Certificate → lưu vào Secret vault-tls

# ── Bước 1: SelfSigned Issuer ─────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

---
# ── Bước 2: Root CA Certificate ──────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-ca
  namespace: vault
spec:
  isCA: true
  commonName: vault-ca
  secretName: vault-ca-secret
  duration: 87600h     # 10 năm
  renewBefore: 720h    # renew trước 30 ngày
  privateKey:
    algorithm: RSA
    size: 4096
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer

---
# ── Bước 3: CA Issuer dùng root CA vừa tạo ───────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: vault-ca-issuer
  namespace: vault
spec:
  ca:
    secretName: vault-ca-secret

---
# ── Bước 4: Vault Server Certificate ─────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-server-tls
  namespace: vault
spec:
  secretName: vault-tls
  duration: 8760h      # 1 năm
  renewBefore: 720h    # renew trước 30 ngày
  isCA: false
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - vault
    - vault.vault.svc
    - vault.vault.svc.cluster.local
    - localhost
  ipAddresses:
    - 127.0.0.1
  issuerRef:
    name: vault-ca-issuer
    kind: Issuer
