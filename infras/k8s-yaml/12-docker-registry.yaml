---
# Docker Registry - K8s Native deployment
# Lưu trữ images cho microservices, accessible từ cluster + local host
apiVersion: v1
kind: Namespace
metadata:
  name: registry

---
# PVC cho registry data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-storage
  namespace: registry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi

---
# Deployment - Docker Registry
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
  namespace: registry
  labels:
    app: docker-registry
    zta.job7189/role: db
    zta.job7189/tier: T3
    zta.job7189/env: prod
    zta.job7189/data-classification: none
    zta.job7189/exposure: cluster-only
    zta.job7189/team: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-registry
  template:
    metadata:
      labels:
        app: docker-registry
        zta.job7189/role: db
        zta.job7189/tier: T3
        zta.job7189/env: prod
        zta.job7189/data-classification: none
        zta.job7189/exposure: cluster-only
        zta.job7189/team: platform
    spec:
      serviceAccountName: docker-registry
      # Pin to data-tier node so registry PVC (local-path) lands on srv05
      # alongside vault/mysql/kafka. See knowledge-base/migration/transition-srv04-to-srv05.md.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                - 7189srv05
      containers:
      - name: registry
        image: registry:2
        ports:
        - containerPort: 5000
          name: registry
        volumeMounts:
        - name: registry-storage
          mountPath: /var/lib/registry
        env:
        - name: REGISTRY_STORAGE_DELETE_ENABLED
          value: "true"
        # Allow pushing without SSL (local dev environment)
        - name: REGISTRY_HTTP_ADDR
          value: "0.0.0.0:5000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /v2/
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: registry-storage
        persistentVolumeClaim:
          claimName: registry-storage

---
# Service - ClusterIP (for pods inside cluster)
apiVersion: v1
kind: Service
metadata:
  name: docker-registry
  namespace: registry
  labels:
    app: docker-registry
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: registry
  selector:
    app: docker-registry

---
# Service - NodePort (for host docker cli access)
apiVersion: v1
kind: Service
metadata:
  name: docker-registry-nodeport
  namespace: registry
  labels:
    app: docker-registry
spec:
  type: NodePort
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30005
    protocol: TCP
    name: registry
  selector:
    app: docker-registry

---
# Service Account for registry operations (not strictly needed for basic registry, but good practice)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: docker-registry
  namespace: registry

