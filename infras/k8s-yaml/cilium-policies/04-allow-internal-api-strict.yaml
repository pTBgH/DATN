apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-internal-api-workspace"
  namespace: "job7189-apps"
spec:
  endpointSelector:
    matchLabels:
      app: workspace-service
  ingress:
  - fromEndpoints:
    - matchLabels:
        app: job-service
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      rules:
        http:
        - method: "GET"
          path: "/api/v1/internal/workspaces/.*"
        - method: "GET"
          path: "/api/internal/permissions/.*"
        - method: "POST"
          path: "/api/internal/companies/batch-info"
  - fromEndpoints:
    - matchLabels:
        app: hiring-service
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      rules:
        http:
        - method: "GET"
          path: "/api/internal/permissions/.*"
  - fromEndpoints:
    - matchLabels:
        app: identity-service
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      rules:
        http:
        - method: "GET"
          path: "/api/internal/workspaces/by-user/.*"
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-internal-api-identity"
  namespace: "job7189-apps"
spec:
  endpointSelector:
    matchLabels:
      app: identity-service
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: job7189-apps
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      rules:
        http:
        - method: "POST"
          path: "/api/internal/auth/sync-user"
  - fromEndpoints:
    - matchLabels:
        app: hiring-service
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      rules:
        http:
        - method: "GET"
          path: "/api/v1/internal/profile/.*"
        - method: "GET"
          path: "/api/internal/users/.*"
---
apiVersion: "cilium.io/v2"
