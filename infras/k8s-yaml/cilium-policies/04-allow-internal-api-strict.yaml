---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-internal-api-storage"
  namespace: "job7189-apps"
spec:
  endpointSelector:
    matchLabels:
      app: storage-service
  ingress:
  - fromEndpoints:
