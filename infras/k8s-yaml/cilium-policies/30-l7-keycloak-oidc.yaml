# =============================================================================
# PR #10 — L7 enforcement: Keycloak OIDC
# Reference: knowledge-base/20-5w1h-policy-matrix.md row #7-8
#
# Keycloak admin console (/admin) chỉ accessible từ host (operator); workload
# chỉ cần realm endpoints (login, token, jwks, userinfo).
#
# ARCHITECTURE NOTE — Same-node Envoy loopback issue:
# ingress-nginx và Keycloak đều trên 7189srv02. Khi Cilium L7 redirect traffic
# qua Envoy (TPROXY), cùng node gây loopback timeout. Fix: ingress-nginx dùng
# L4-only (nginx tự handle HTTP filtering). Kong giữ L7 vì là external API GW.
# =============================================================================
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: l7-keycloak-oidc-allowlist
  namespace: security
spec:
  endpointSelector:
    matchLabels:
      app: keycloak
      zta.job7189/role: sso
  ingress:
  # 1) Kong gateway only — L7 HTTP inspection (external API entry point)
  #    ingress-nginx removed from L7 due to same-node Envoy loopback timeout.
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: gateway
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP

  # 2) ingress-nginx — L4-only (nginx is reverse proxy, handles HTTP itself;
  #    same-node Envoy loopback would cause TCP connect timeout)
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: ingress-nginx
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP

  # 3) Internal apps & oauth2-proxy — L4-only to bypass same-node Envoy loopback issues
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: job7189-apps
        zta.job7189/role: api
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: security
        zta.job7189/role: proxy
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP

  # 4) Admin console & Probes — host/remote-node allowed for all paths (L4-only)
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
