# =============================================================================
# PR #10 — L4 enforcement: Vault API
# Reference: knowledge-base/20-5w1h-policy-matrix.md row #5
#
# IMPORTANT — TLS COMPATIBILITY NOTE (2026-05-05):
# Vault uses TLS (HTTPS) on port 8200. Cilium L7 HTTP rules on a TLS port cause
# the Envoy proxy to intercept the TCP stream and treat it as plaintext HTTP,
# which breaks the TLS handshake. Symptom: vault-agent-init fails with
# "http: server gave HTTP response to HTTPS client".
#
# ROOT CAUSE: Cilium L7 HTTP inspection is INCOMPATIBLE with TLS endpoints
# unless Cilium is configured with the endpoint's TLS certificates (not done here).
# The correct ZTA posture is L4 (port-level) allow rules combined with:
#   • Vault's own mutual TLS (cert at /vault/tls/tls.crt)
#   • Cilium WireGuard node-to-node encryption (already enabled in step 08)
#   • Namespace-level default-deny (already applied)
#
# If L7 Vault path filtering is required in the future, use Cilium's
# terminatingTLS / originatingTLS stanza to provide the Vault CA cert so
# Envoy can properly terminate and re-originate TLS connections.
#
# Selector: pod app=vault in namespace vault (StatefulSet vault-0).
# Source: all backend services (vault-agent-init) + injector + vault-dev.
# =============================================================================
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: l7-vault-api-allowlist
  namespace: vault
spec:
  endpointSelector:
    matchLabels:
      app: vault
      zta.job7189/role: secret-store
      zta.job7189/env: prod
  ingress:
  # 1) identity-service (job7189-apps) — DB cred JIT + sys/health
  #    L4-only: Vault's own TLS + WireGuard provide transport security.
  #    Removing HTTP rules prevents Cilium Envoy from intercepting the TLS stream.
  - fromEndpoints:
    - matchLabels:
        io.cilium.k8s.policy.serviceaccount: identity-service
        io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: job7189-apps
    toPorts:
    - ports:
      - port: "8200"
        protocol: TCP
  # 2) All other backend services with Vault Agent Injector (vault-agent-init)
  #    L4-only for the same reason. Covers all 7 Laravel microservices.
  - fromEndpoints:
    - matchExpressions:
      - key: zta.job7189/role
        operator: In
        values: ["api"]
      - key: zta.job7189/team
        operator: In
        values: ["backend"]
      - key: io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name
        operator: In
        values: ["job7189-apps"]
    toPorts:
    - ports:
      - port: "8200"
        protocol: TCP
  # 3) vault-agent-injector (same namespace) — webhook callback to vault
  - fromEndpoints:
    - matchLabels:
        io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: vault
    toPorts:
    - ports:
      - port: "8200"
        protocol: TCP
      - port: "8201"
        protocol: TCP
  # 4) host + remote-node (kubelet health checks, kind bridge traffic)
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "8200"
        protocol: TCP
