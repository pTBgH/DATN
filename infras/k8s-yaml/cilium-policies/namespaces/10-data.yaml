# =============================================================================
# Namespace: data  (Tier 1 — DB + Event bus)
# DAAS:
#   Data: mysql (3306), kafka (9092/9093) — chứa user/CV/job/message
# Step: 2.3.2 — Microperimeter + default-deny
#
# Default-deny đã có trong infras/k8s-yaml/20-security-policies.yaml
# (default-deny-data). File này KHÔNG re-define mà bổ sung allow rules
# cho Kafka và Prometheus scrape.
#
# MySQL allow rules đã có:
#   - allow-mysql-from-identity  (data/mysql ← job7189-apps/identity-service)
#   - allow-mysql-to-vault       (data/mysql → vault/8200)
#
# File này thêm:
#   - allow-mysql-from-keycloak  (data/mysql ← security/keycloak)
#   - allow-mysql-from-phpmyadmin
#   - allow-mysql-from-vault     (data/mysql ← vault: dynamic credential issuance)
#   - allow-kafka-from-apps
#   - (allow-kafka-from-kafbat REMOVED — Kafka UI never used; see
#      infras/k8s-yaml/03-kafka.yaml Phần 2)
#   - allow-prometheus-scrape-data
#   - allow-dns-egress-data
#
# IMPORTANT — Vault dynamic credentials require MySQL ingress from vault namespace:
#   Vault's database secrets engine opens connections to MySQL:3306 to CREATE
#   short-lived DB users per service. Without allow-mysql-from-vault, the
#   default-deny-data policy drops these connections and vault-agent-init
#   reports "context deadline exceeded" when rendering DB credential templates.
#   The corresponding Vault-side egress allow is in 11-vault.yaml.
# =============================================================================

# 1) DNS egress (mosquito test client + mysql/kafka cần resolve service)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress-data
  namespace: data
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
---
# 2) MySQL ingress: bổ sung từ Keycloak (data + identity store)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-mysql-from-keycloak
  namespace: data
spec:
  endpointSelector:
    matchLabels:
      app: mysql
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: security
        app: keycloak
    toPorts:
    - ports:
      - port: "3306"
        protocol: TCP
---
# 3) MySQL ingress: từ Vault (database secrets engine — dynamic cred issuance)
#    Vault connects to MySQL to CREATE short-lived service-specific DB users.
#    See corresponding egress rule in 11-vault.yaml (allow-vault-egress-mysql).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-mysql-from-vault
  namespace: data
spec:
  endpointSelector:
    matchLabels:
      app: mysql
  ingress:
  - fromEndpoints:
    - matchLabels:
        app: vault
        k8s:io.kubernetes.pod.namespace: vault
    toPorts:
    - ports:
      - port: "3306"
        protocol: TCP
---
# 4) MySQL ingress: bổ sung từ phpmyadmin (admin UI)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-mysql-from-phpmyadmin
  namespace: data
spec:
  endpointSelector:
    matchLabels:
      app: mysql
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: management
        app: phpmyadmin
    toPorts:
    - ports:
      - port: "3306"
        protocol: TCP
---
# 4) Kafka ingress: từ tất cả service trong job7189-apps (publish/subscribe)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kafka-from-apps
  namespace: data
spec:
  endpointSelector:
    matchLabels:
      app: kafka
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: job7189-apps
    toPorts:
    - ports:
      - port: "9092"
        protocol: TCP
      - port: "9093"
        protocol: TCP
---
# 4b) Kafka egress phía apps: cho phép tất cả pod trong job7189-apps gọi kafka:9092/9093.
#     Đây là CNP nằm trong namespace job7189-apps (egress source side) — bù
#     cho default-deny-job7189-apps. Nếu không có, hiring-service / job-service /
#     ... bị DROP khi publish/consume Kafka.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apps-egress-kafka
  namespace: job7189-apps
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: data
        app: kafka
    toPorts:
    - ports:
      - port: "9092"
        protocol: TCP
      - port: "9093"
        protocol: TCP
---
# 4c) Intra-namespace traffic trong job7189-apps:
#     Mỗi microservice có Redis riêng (vd: hiring-service-redis), gọi nội bộ
#     qua port 6379. Cho phép intra-ns traffic trên các port service phổ biến
#     (Redis 6379, Octane 9000, HTTP 80). PR #10 sẽ refine theo từng workload
#     (5W1H matrix), còn ở PR #8 cho phép broad intra-ns để default-deny không
#     break các microservice cùng tin cậy.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apps-intra-ns-services
  namespace: job7189-apps
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: job7189-apps
    toPorts:
    - ports:
      - port: "6379"   # Redis
        protocol: TCP
      - port: "9000"   # Laravel Octane
        protocol: TCP
      - port: "80"     # HTTP
        protocol: TCP
      - port: "8080"   # HTTP alt
        protocol: TCP
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: job7189-apps
    toPorts:
    - ports:
      - port: "6379"
        protocol: TCP
      - port: "9000"
        protocol: TCP
      - port: "80"
        protocol: TCP
      - port: "8080"
        protocol: TCP
---
