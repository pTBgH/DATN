# =============================================================================
# Namespace: gateway  (Tier 2 — Kong PEP biên)
# DAAS: Service: kong-gateway (PEP north-south)
# Step: 2.3.2 — Microperimeter + default-deny
#
# kong-proxy: 8000 (HTTP), 8443 (HTTPS), 8001 (admin — chỉ in-namespace)
# Egress: tới mọi service trong job7189-apps + security/keycloak
# =============================================================================

# 1) Default-deny
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-gateway
  namespace: gateway
spec:
  endpointSelector: {}
  # Default-deny pattern: select-all + rule với matchLabels không tồn tại.
  # Schema validation pass (VALID=True) + default-deny enforce (vì rule không match pod nào).
  ingress:
  - fromEndpoints:
    - matchLabels:
        cilium.zta/marker: umbrella-deny
  egress:
  - toEndpoints:
    - matchLabels:
        cilium.zta/marker: umbrella-deny
---
# 2) DNS egress
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress-gateway
  namespace: gateway
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
---
# 3) Ingress vào kong proxy:
#    - port 8000/8443 (proxy public): mở cho ingress-nginx + world (NodePort
#      30000 từ external, Cilium KPR preserve source IP → identity 'world')
#      + host/remote-node (kube-proxy SNAT, health-check)
#    - port 8001 (admin API): chỉ cho phép intra-namespace (NEVER world)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kong-proxy-ingress
  namespace: gateway
spec:
  endpointSelector:
    matchLabels:
      app: kong-gateway
  ingress:
  # Public proxy ports — open to ingress-nginx, host (NodePort SNAT), world
  # (external NodePort with KPR source preservation)
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: ingress-nginx
    toPorts:
    - ports:
      - port: "8000"
        protocol: TCP
      - port: "8443"
        protocol: TCP
  - fromEntities:
    - host
    - remote-node
    - world
    toPorts:
    - ports:
      - port: "8000"
        protocol: TCP
      - port: "8443"
        protocol: TCP
  # Admin API (8001) — chỉ cho phép từ host/remote-node (kubectl port-forward,
  # health-check). KHÔNG cho world.
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "8001"
        protocol: TCP
---
# 4) Egress kong → mọi service trong job7189-apps qua port 80 (svc port)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kong-egress-apps
  namespace: gateway
spec:
  endpointSelector:
    matchLabels:
      app: kong-gateway
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: job7189-apps
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
---
# 5) Egress kong → keycloak (security/8080) cho JWKS / OIDC discovery
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kong-egress-keycloak
  namespace: gateway
spec:
  endpointSelector:
    matchLabels:
      app: kong-gateway
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: security
        app: keycloak
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
---
# 5b) Egress kong → OPA user-authz PDP (security/8181) — Phase 5.B.2
#     Every authenticated request hits OPA before reaching its upstream
#     service for a role-based authz decision (Lua pre-function plugin
#     in infras/kong/kong.yml). Failure-mode: fail-open by default so a
#     transient OPA outage doesn't brick the gateway.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kong-egress-opa
  namespace: gateway
spec:
  endpointSelector:
    matchLabels:
      app: kong-gateway
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: security
        app: opa
    toPorts:
    - ports:
      - port: "8181"
        protocol: TCP
---
# 6) Egress kong → phpmyadmin (qua route admin) — Tier 3, optional
#    (kafbat removed — Kafka UI never used; see infras/k8s-yaml/03-kafka.yaml Phần 2)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kong-egress-management
  namespace: gateway
spec:
  endpointSelector:
    matchLabels:
      app: kong-gateway
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: management
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
---
# 7) Allow Prometheus scrape kong status (port 8001 hoặc 8100 tuỳ config)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-prometheus-scrape-gateway
  namespace: gateway
spec:
  endpointSelector:
    matchLabels:
      app: kong-gateway
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        io.cilium.k8s.policy.serviceaccount: prometheus
    toPorts:
    - ports:
      - port: "8100"
        protocol: TCP
      - port: "8001"
        protocol: TCP
