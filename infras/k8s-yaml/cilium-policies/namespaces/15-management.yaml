# =============================================================================
# Namespace: management  (Tier 3 — admin UI)
# DAAS:      Service: phpmyadmin, kafbat (admin only)
# Step:      2.3.2 — Microperimeter + default-deny
# Notes:
#   - Ingress chỉ qua oauth2-proxy (security/oauth2-proxy:4180)
#   - Egress: phpmyadmin → data/mysql:3306; kafbat → data/kafka:9092
# =============================================================================

# 1) Default-deny
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-management
  namespace: management
spec:
  endpointSelector: {}
  # Cilium <1.14 dùng pattern empty list (VALID=False quirk; default-deny vẫn enforce).
  ingress: []
  egress: []
---
# 2) DNS egress
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress-management
  namespace: management
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
      rules:
        dns:
        - matchPattern: "*"
---
# 3) Ingress vào phpmyadmin chỉ từ oauth2-proxy + ingress-nginx
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-phpmyadmin-ingress
  namespace: management
spec:
  endpointSelector:
    matchLabels:
      app: phpmyadmin
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: security
        app: oauth2-proxy
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: ingress-nginx
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
---
# 4) Ingress vào kafbat chỉ từ oauth2-proxy + ingress-nginx
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kafbat-ingress
  namespace: management
spec:
  endpointSelector:
    matchLabels:
      app: kafbat
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: security
        app: oauth2-proxy
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: ingress-nginx
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
---
# 5) Egress phpmyadmin → mysql (data/3306)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-phpmyadmin-egress-mysql
  namespace: management
spec:
  endpointSelector:
    matchLabels:
      app: phpmyadmin
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: data
        app: mysql
    toPorts:
    - ports:
      - port: "3306"
        protocol: TCP
---
# 6) Egress kafbat → kafka (data/9092)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kafbat-egress-kafka
  namespace: management
spec:
  endpointSelector:
    matchLabels:
      app: kafbat
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: data
        app: kafka
    toPorts:
    - ports:
      - port: "9092"
        protocol: TCP
      - port: "9093"
        protocol: TCP
---
# 7) Allow Prometheus scrape (egress từ monitoring → management/*)
#    Thêm tách bạch để các UI tool có thể được scrape sau này.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-prometheus-scrape-management
  namespace: management
spec:
  endpointSelector: {}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: monitoring
        app: prometheus
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
