# 7) Allow Prometheus scrape (egress từ monitoring → management/*)
#    Thêm tách bạch để các UI tool có thể được scrape sau này.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-prometheus-scrape-management
  namespace: management
spec:
  endpointSelector: {}
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: monitoring
        app: prometheus
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
