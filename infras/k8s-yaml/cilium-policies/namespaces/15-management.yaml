# =============================================================================
# Namespace: management  (Tier 3 — admin UI)
# DAAS:      Service: phpmyadmin (kafbat removed — Kafka UI never used; see
#                                infras/k8s-yaml/03-kafka.yaml Phần 2)
# Step:      2.3.2 — Microperimeter + default-deny
# Notes:
#   - Ingress chỉ qua oauth2-proxy (security/oauth2-proxy:4180)
#   - Egress: phpmyadmin → data/mysql:3306
#   - kafbat-related policies (sections 4 & 6) commented out below.
# =============================================================================

# 1) Default-deny
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-management
  namespace: management
spec:
  endpointSelector: {}
  # Default-deny pattern: select-all + rule với matchLabels không tồn tại.
  # Schema validation pass (VALID=True) + default-deny enforce (vì rule không match pod nào).
  ingress:
  - fromEndpoints:
    - matchLabels:
        cilium.zta/marker: umbrella-deny
  egress:
  - toEndpoints:
    - matchLabels:
        cilium.zta/marker: umbrella-deny
---
# 2) DNS egress
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress-management
  namespace: management
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
---
# 3) Ingress vào phpmyadmin chỉ từ oauth2-proxy + ingress-nginx
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-phpmyadmin-ingress
  namespace: management
spec:
  endpointSelector:
    matchLabels:
      app: phpmyadmin
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: security
        app: oauth2-proxy
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: ingress-nginx
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
---
