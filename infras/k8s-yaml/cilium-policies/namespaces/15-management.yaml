# 5) Egress phpmyadmin → mysql (data/3306)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-phpmyadmin-egress-mysql
  namespace: management
spec:
  endpointSelector:
    matchLabels:
      app: phpmyadmin
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.cilium.k8s.namespace.labels.kubernetes.io/metadata.name: data
        app: mysql
    toPorts:
    - ports:
      - port: "3306"
        protocol: TCP
---
