# ConfigMap chứa custom headers nginx forward vào OAuth2 Proxy
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-headers
  namespace: security
data:
  X-Forwarded-Host: "$http_host"
  X-Forwarded-Proto: "http"
