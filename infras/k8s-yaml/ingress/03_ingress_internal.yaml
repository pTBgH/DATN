# ── Keycloak (auth.job7189.local) ─────────────────────────────────────────────
# Internal-only Ingress cho Keycloak — phục vụ browser LAN/VLAN qua port 80.
# KHÔNG có annotation auth-url vì Keycloak chính là OIDC provider (self-protect
# bằng admin console password + realm-level public/private endpoints).
# Lưu ý: 99-ingress.yaml còn 1 ingress 'auth.job7189.com' cho Cloudflare tunnel,
# 2 hostname trỏ cùng service keycloak nhưng dùng đường khác nhau.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-auth-internal
  namespace: security
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  ingressClassName: nginx
  rules:
    - host: auth.job7189.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080

---
# ── phpMyAdmin ────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-phpmyadmin
  namespace: management
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.security.svc.cluster.local/oauth2/auth"

    # $http_host bao gồm cả port (db.job7189.local:8080)
    # $host chỉ có hostname không có port → redirect thiếu port → vào Kong
    nginx.ingress.kubernetes.io/auth-signin: "http://$http_host/oauth2/start?rd=$escaped_request_uri"

    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email"
spec:
  ingressClassName: nginx
  rules:
    - host: db.job7189.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: phpmyadmin
                port:
                  number: 80

