# PR #16 — Image Provenance
# ConstraintTemplate: K8sBlockLatestTag
#
# Reject/audit Pods that reference any image with the `:latest` tag (or
# implicit no-tag, which Docker treats as :latest). `:latest` is the most
# unstable mutable tag — its content changes every push. Even with digest
# enforcement disabled, `:latest` is always a critical violation.
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblocklatesttag
  annotations:
    description: >
      Reject Pods using `:latest` (or implicit no-tag) image references.
      Stricter than K8sImageDigestRequired — applies even to exempt images.
spec:
  crd:
    spec:
      names:
        kind: K8sBlockLatestTag
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8sblocklatesttag

      # Collect images from Pod and Pod-template specs.
      images[image] {
        image := input.review.object.spec.containers[_].image
      }
      images[image] {
        image := input.review.object.spec.initContainers[_].image
      }
      images[image] {
        image := input.review.object.spec.template.spec.containers[_].image
      }
      images[image] {
        image := input.review.object.spec.template.spec.initContainers[_].image
      }

      # Implicit-no-tag check: if there's no `:` after the last `/`, the image
      # has no explicit tag — Docker defaults to `:latest`.
      no_explicit_tag(image) {
        not contains(image, "@sha256:")
        parts := split(image, "/")
        last := parts[count(parts) - 1]
        not contains(last, ":")
      }

      # Explicit `:latest` tag check.
      ends_with_latest(image) {
        not contains(image, "@sha256:")
        endswith(image, ":latest")
      }

      violation[{"msg": msg}] {
        image := images[_]
        ends_with_latest(image)
        msg := sprintf(
          "image %q uses ':latest' tag — reject. Use a specific version " +
          "tag (e.g. 1.27.4) or pin to sha256 digest.",
          [image],
        )
      }

      violation[{"msg": msg}] {
        image := images[_]
        no_explicit_tag(image)
        msg := sprintf(
          "image %q has no explicit tag (implicit ':latest') — reject. " +
          "Specify a version tag.",
          [image],
        )
      }
