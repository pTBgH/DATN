# PR #16 — Image Provenance
# Constraint: block-latest-tag
#
# enforcementAction: dryrun first — audit existing latest-tagged workloads
# without breaking them. Switch to "deny" once all `:latest` references
# are migrated to specific versions.
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sBlockLatestTag
metadata:
  name: block-latest-tag
spec:
  enforcementAction: dryrun
  match:
    kinds:
    - apiGroups: [""]
      kinds: ["Pod"]
    - apiGroups: ["apps"]
      kinds: ["Deployment", "StatefulSet", "DaemonSet", "ReplicaSet"]
    - apiGroups: ["batch"]
      kinds: ["Job", "CronJob"]
    namespaces:
    - "data"
    - "vault"
    - "security"
    - "monitoring"
    - "gateway"
    - "management"
    - "job7189-apps"
    - "frontend"
    excludedNamespaces:
    - "kube-system"
    - "kube-public"
    - "kube-node-lease"
    - "ingress-nginx"
    - "cert-manager"
    - "gatekeeper-system"
    - "default"
