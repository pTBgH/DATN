---
# ============================================================================
# ClusterImagePolicy: zta-system-passthrough
#
# Allow-list for cluster infrastructure images that we do NOT control + cannot
# sign (kube-system, cilium, gatekeeper, vault, monitoring stack, etc.).
# Without this, policy-controller would reject every restart of these pods
# during version upgrades and brick the cluster.
#
# We bind this policy with mode 'warn' (or 'allow' via static authority) and
# match on the well-known image globs.
# ============================================================================
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: zta-system-passthrough
  annotations:
    zta-policy/scope: cluster-infra
    zta-policy/mode: passthrough-allow
spec:
  images:
  - glob: "registry.k8s.io/**"
  - glob: "quay.io/cilium/**"
  - glob: "quay.io/coreos/**"
  - glob: "quay.io/keycloak/**"
  - glob: "quay.io/jetstack/**"
  - glob: "quay.io/strimzi/**"
  - glob: "ghcr.io/spiffe/**"
  - glob: "ghcr.io/sigstore/**"
  - glob: "ghcr.io/cilium/**"
  - glob: "docker.io/library/**"
  - glob: "docker.io/bitnami/**"
  - glob: "hashicorp/vault*"
  - glob: "hashicorp/vault-k8s*"
  - glob: "openpolicyagent/gatekeeper*"
  - glob: "ghcr.io/falcosecurity/**"
  - glob: "rancher/local-path-provisioner**"
  - glob: "elastic.co/**"
  - glob: "docker.elastic.co/**"
  authorities:
  # 'static' authority always evaluates true; effectively allow-list.
  - static:
      action: pass
  mode: warn

---
# ============================================================================
# ClusterImagePolicy: zta-job7189-apps-signed
#
# Enforce real Cosign signatures for application images deployed to the
# `job7189-apps` namespace. The cosign public key is the same one published
# in PR #16 (security/zta-cosign-public-key ConfigMap, generated by
# scripts/zta-cosign-keygen.sh).
#
# When mode=warn, unsigned images are admitted but emit a warning event.
# Switch to mode=enforce when all images are properly signed in the registry.
# ============================================================================
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: zta-job7189-apps-signed
  annotations:
    zta-policy/scope: app-workloads
    zta-policy/mode: warn
spec:
  images:
  - glob: "**"   # Matched only inside the labeled namespace job7189-apps.
  authorities:
  - name: zta-cosign-key
    key:
      kms: ""
      # Public key value is patched at deploy-time by scripts/zta-deploy-policy-controller.sh
      # from the ConfigMap security/zta-cosign-public-key (PR #16).
      data: |
        -----BEGIN PUBLIC KEY-----
        REPLACED_AT_DEPLOY_TIME
        -----END PUBLIC KEY-----
  mode: warn

---
# ============================================================================
# ClusterImagePolicy: zta-keyless-trust-job7189
#
# Optional: trust images keyless-signed via GitHub Actions OIDC
# (Fulcio + Rekor). Useful when the project later switches to GHA-based
# image build & sign pipeline. Currently scoped to images under our org
# (ghcr.io/ptbgh/**) — adjust the glob if you push to a different registry.
# ============================================================================
apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: zta-keyless-trust-job7189
  annotations:
    zta-policy/scope: keyless-supply-chain
    zta-policy/mode: warn
spec:
  images:
  - glob: "ghcr.io/ptbgh/**"
  authorities:
  - name: keyless-gha
    keyless:
      url: https://fulcio.sigstore.dev
      identities:
      - issuer: https://token.actions.githubusercontent.com
        subjectRegExp: "^https://github.com/pTBgH/.+$"
  mode: warn
