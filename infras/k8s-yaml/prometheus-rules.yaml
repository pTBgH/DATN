# =============================================================================
# PrometheusRule — ZTA alerting rules
#
# Since this lab uses vanilla Prometheus (not kube-prometheus-stack), these
# rules are loaded via Prometheus recording/alerting rules ConfigMap. The
# rules are formatted as standard Prometheus rule groups.
#
# Loading: ConfigMap is mounted into the prometheus pod by 08-prometheus.yaml
# (volume `zta-rules`, mount path `/etc/prometheus/zta-rules`) and picked
# up by the `rule_files: /etc/prometheus/zta-rules/*.yml` glob in the
# prometheus.yml config. Apply via `scripts/zta-deploy-observability-rules.sh`.
#
# Layout (groups, all severity at `warning` unless noted, all `team:` label
# routes the alert via Alertmanager to the right channel in PR-R):
#
#   zta-trust-score (PR-L)  — PDP-side risk signals
#     ZTATrustScoreDropped         pdp_trust_score < 60               warning
#     ZTACVECriticalImage          Trivy critical findings            critical
#     ZTALabelDriftHigh            label drift > 5/min                warning
#
#   zta-network (PR-L + PR-O + Phase 3)  — Cilium / Hubble / DNS L4 signals
#     ZTACiliumDropsHigh             per-reason drop rate > 10/s              warning
#     ZTACiliumCrossTierDropZScore   cross-tier drop z-score > 3 sigma        warning   (Phase 3 — replaces > 3x baseline)
#     ZTAHubbleDNSExfilSuspect       long-subdomain DNS rate                  warning   (PR-O — needs Hubble metrics, enabled in Phase 3)
#     ZTAHubbleEgressToThreatCIDR    pod egress to external reserved:world    critical  (Phase 3 — rewritten: Policy denied + destination=reserved:world)
#
#   zta-l7 (PR-O + Phase 3)  — Kong gateway L7 signals
#     ZTAKongRequestRateZScore     per-service request z-score > 3 sigma    warning   (Phase 3 — replaces > 3x baseline)
#     ZTAKong5xxRateHigh           5xx rate > 5% for 5m                     critical
#     ZTAKongLatencyP95High        p95 latency > 1s for 5m                  warning
#     ZTAKongJWTAuthFailureSpike   per-consumer 401 > 10/min                warning
#
#   zta-runtime (PR-O + Phase 3)  — Tetragon kernel-event signals
#     ZTATetragonEventRateZScore   per-workload event z-score > 3 sigma      warning   (Phase 3 — replaces > 5x baseline)
#     ZTATetragonShellExec         shell exec > 0.1/s sustained              critical  (Phase 3 — tuned: filter healthcheck baseline)
#     ZTATetragonShellExecBurst    shell exec > 1/s burst                    critical  (Phase 3 — new)
#     ZTATetragonSensitiveFileRead read of /etc/shadow / kube creds         critical
#     ZTATetragonKernelModuleLoad  init_module / finit_module event         critical
#
#   zta-cdm-trust (PR-O)  — supply-chain + identity signals
#     ZTACosignAdmissionDenied     policy-controller webhook deny           critical
#     ZTASpireAttestFailureRate    SPIRE agent attestation failures         warning
#     ZTACertExpirySoon            cert-manager cert expires < 7d           warning
#
#   zta-baselines (Phase 3)  — recording rules backing z-score alerts above
#     zta:hubble_drop:cross_tier:rate_5m         + :avg1h + :stddev1h
#     zta:kong_http_requests:service:rate_5m     + :avg1h + :stddev1h
#     zta:tetragon_events:workload:rate_5m       + :avg1h + :stddev1h
#
# Total: 19 alerts (4 PR-L baseline + 13 PR-O Phase 2 + 2 Phase 3 new) +
# 9 recording rules in `zta-baselines`.
#
# MITRE ATT&CK technique mapping is stored as the `mitre_tid` label on each
# alert (T1059 = Command and Scripting Interpreter, T1190 = Exploit
# Public-Facing App, T1611 = Escape to Host, T1078 = Valid Accounts,
# T1041 = Exfiltration over C2, T1071 = Application Layer Protocol,
# T1556 = Modify Auth Process, T1543 = Create or Modify System Process,
# T1486 = Data Encrypted for Impact). See doc/39-zta-alert-catalog.md
# for the full table.
#
# Alerts referencing metrics that need the matching collector to be deployed
# (Kong /metrics, Tetragon /metrics, Hubble metrics, cert-manager metrics,
# SPIRE metrics) will stay quiet — never fire — until those collectors are
# scraped. The corresponding scrape config landed in PR-N (B2 fix).
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-zta-rules
  namespace: monitoring
  labels:
    app: prometheus
    cilium.zta/tier: T2
data:
  zta-rules.yml: |
    groups:
    # ----------------------------------------------------------------------
    # PR-L baseline: PDP-side risk signals
    # ----------------------------------------------------------------------
    - name: zta-trust-score
      interval: 30s
      rules:
      - alert: ZTATrustScoreDropped
        expr: pdp_trust_score < 60
        for: 2m
        labels:
          severity: warning
          team: security
          mitre_tid: T1078
        annotations:
          summary: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has low trust score ({{ $value }})"
          description: "Trust score dropped below 60 for 2+ minutes. Check label coverage and CVE posture."
          runbook_url: "doc/25-pdp-controller.md"

      - alert: ZTACVECriticalImage
        expr: pdp_cve_critical_total > 0
        for: 1m
        labels:
          severity: critical
          team: security
          mitre_tid: T1190
        annotations:
          summary: "Namespace {{ $labels.namespace }} has {{ $value }} critical CVE(s)"
          description: "Trivy Operator detected critical CVEs. Investigate and patch affected images."
          runbook_url: "doc/zta-gap-decision.md"

      - alert: ZTALabelDriftHigh
        expr: rate(pdp_label_drift_total[5m]) > 0.083
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High label drift rate in {{ $labels.namespace }} ({{ $value }}/s)"
          description: "More than 5 label drift events per minute. Pods may be recreated without proper ZTA labels."
          runbook_url: "doc/19-label-schema.md"

    # ----------------------------------------------------------------------
    # PR-L baseline + PR-O Phase 2: Cilium / Hubble L4 signals
    # ----------------------------------------------------------------------
    - name: zta-network
      interval: 30s
      rules:
      - alert: ZTACiliumDropsHigh
        expr: sum(rate(cilium_drop_count_total[5m])) by (reason) > 10
        for: 5m
        labels:
          severity: warning
          team: network
        annotations:
          summary: "Cilium drops elevated: {{ $labels.reason }} ({{ $value }}/s)"
          description: "High rate of Cilium packet drops. Check CNP rules and pod connectivity."
          runbook_url: "doc/05-observability-stack.md"

      # Cross-tier drop z-score (Tier-2 statistical detection, Phase 3).
      #
      # Replaces the previous `> 3x baseline` rule. Z-score = (current -
      # avg1h) / stddev1h. Alert when current value is 3 sigma above its
      # 1h baseline mean. This handles low-variance pairs (where "3x" is
      # noisy due to single drops) and high-variance ones (where 3x is
      # too lenient) symmetrically.
      #
      # Baselines come from `zta-baselines` recording rules below so the
      # subquery + stddev_over_time only runs once per evaluation period,
      # not once per alert.
      #
      # clamp_min(stddev, 0.001) avoids divide-by-zero for namespace pairs
      # that have been completely flat for the last hour (a fresh deploy
      # window — the alert correctly does not fire in that case).
      #
      # Pre-req: Hubble metrics MUST be enabled in cilium-values.yaml
      # with labelsContext exposing `source_namespace` and
      # `destination_namespace`. See `k8s-management/cilium/cilium-values.yaml`
      # — without it `hubble_drop_total` has no namespace labels and this
      # alert silently never fires.
      - alert: ZTACiliumCrossTierDropZScore
        expr: |
          (
            zta:hubble_drop:cross_tier:rate_5m
            - zta:hubble_drop:cross_tier:rate_5m:avg1h
          )
          / clamp_min(zta:hubble_drop:cross_tier:rate_5m:stddev1h, 0.001)
          > 3
          and on() (sum(zta:hubble_drop:cross_tier:rate_5m) > 0.5)
        for: 10m
        labels:
          severity: warning
          team: network
          mitre_tid: T1071
        annotations:
          summary: "Cross-tier drop z-score {{ $labels.source_namespace }} -> {{ $labels.destination_namespace }} ({{ $value | printf \"%.1f\" }} sigma)"
          description: |
            5m drop rate is more than 3 sigma above its 1h baseline.
            Either a new workload is probing the network or a CNP was
            just tightened and is blocking expected traffic. Inspect with:
            hubble observe --from-namespace {{ $labels.source_namespace }} --to-namespace {{ $labels.destination_namespace }} --verdict DROPPED --since 10m
          runbook_url: "doc/34-microseg-phase2c-plan.md"

      # DNS exfil — abnormally long subdomains are a known C2 channel
      # (DNS-tunnel tooling encodes payloads into FQDNs). Hubble exposes
      # query length via hubble_dns_queries_total when Hubble L7 visibility
      # is on, otherwise this stays quiet.
      - alert: ZTAHubbleDNSExfilSuspect
        expr: |
          sum by (source_pod, source_namespace) (
            rate(hubble_dns_queries_total{query=~".{60,}"}[5m])
          ) > 0.2
        for: 10m
        labels:
          severity: warning
          team: security
          mitre_tid: T1071
        annotations:
          summary: "Suspicious long-subdomain DNS pattern from {{ $labels.source_namespace }}/{{ $labels.source_pod }}"
          description: "Pod is issuing > 12/min DNS queries with subdomain length > 60. Possible DNS tunnelling."
          runbook_url: "doc/30-hubble-flow-sink.md"

      # Egress to an external destination (reserved:world) that the
      # threat-intel CCNP drops. Cilium does NOT emit a custom
      # reason=ThreatIntel label — it tags every CCNP-denied flow with
      # reason="Policy denied". To distinguish threat-intel hits from
      # generic in-cluster CNP denies we filter by:
      #   - traffic_direction="EGRESS" (drop on the way out)
      #   - destination=~".*reserved:(world|unknown).*" (no in-cluster
      #     workload, i.e. an external IP)
      # The only CCNP that egress-denies the entire cluster to the world
      # is `cnp-threat-intel-egress-deny` (PR-Q), so any sustained match
      # here is effectively a threat-intel hit.
      #
      # Pre-req: Hubble metrics enabled with destinationContext including
      # `reserved-identity`. See `k8s-management/cilium/cilium-values.yaml`.
      # The chart default does NOT include `reason="Policy denied"` drops
      # in `hubble_drop_total`; you must set `hubble.metrics.enabled:
      # [drop:sourceContext=...;destinationContext=workload-name|reserved-identity;...]`.
      - alert: ZTAHubbleEgressToThreatCIDR
        expr: |
          sum by (source_namespace, source_pod, destination) (
            rate(hubble_drop_total{
              reason="Policy denied",
              traffic_direction="EGRESS",
              destination=~".*reserved:(world|unknown).*"
            }[2m])
          ) > 0
        for: 2m
        labels:
          severity: critical
          team: security
          mitre_tid: T1041
        annotations:
          summary: "Pod {{ $labels.source_namespace }}/{{ $labels.source_pod }} tried to reach external destination {{ $labels.destination }} (blocked by threat-intel CCNP)"
          description: |
            Sustained egress-deny from a workload pod to an external IP /
            unresolved-identity for 2+ minutes. Likely a hit on the
            FireHOL / URLhaus threat-intel block list — quarantine the
            pod and inspect its image + SBOM. Confirm the specific
            destination IP / FQDN with:
            hubble observe --from-namespace {{ $labels.source_namespace }} --from-pod {{ $labels.source_pod }} --verdict DROPPED --since 5m
          runbook_url: "doc/24-adaptive-security-loop.md"

    # ----------------------------------------------------------------------
    # PR-O Phase 2: Kong gateway L7 signals
    #   Metric source: prometheus plugin (infras/kong/kong.yml) +
    #   kong-gateway pod annotation (04-kong-dbless.yaml) scraped by the
    #   default kubernetes-pods job in 08-prometheus.yaml.
    # ----------------------------------------------------------------------
    - name: zta-l7
      interval: 30s
      rules:
      # Phase 3: replaces ZTAKongRequestRateSpike (>3x baseline) with
      # a z-score alert backed by the recording rules in `zta-baselines`.
      - alert: ZTAKongRequestRateZScore
        expr: |
          (
            zta:kong_http_requests:service:rate_5m
            - zta:kong_http_requests:service:rate_5m:avg1h
          )
          / clamp_min(zta:kong_http_requests:service:rate_5m:stddev1h, 0.001)
          > 3
          and on() (sum(zta:kong_http_requests:service:rate_5m) > 1)
        for: 10m
        labels:
          severity: warning
          team: gateway
          mitre_tid: T1190
        annotations:
          summary: "Kong service {{ $labels.service }} request z-score {{ $value | printf \"%.1f\" }} sigma"
          description: |
            Per-service request rate is more than 3 sigma above its 1h
            baseline. Either a legitimate traffic surge (verify with the
            product team) or an enumeration / scraping campaign.
            Cross-reference with `kong_http_requests_total{code=~\"4..\"}`
            for the same service to spot scanners.
          runbook_url: "doc/05-observability-stack.md"

      - alert: ZTAKong5xxRateHigh
        expr: |
          sum by (service) (rate(kong_http_requests_total{code=~"5.."}[5m]))
          /
          sum by (service) (rate(kong_http_requests_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
          team: gateway
          mitre_tid: T1190
        annotations:
          summary: "Kong service {{ $labels.service }} 5xx rate {{ $value | humanizePercentage }}"
          description: "More than 5% of requests are returning 5xx for 5 minutes. Backend pod may be unhealthy OR being actively exploited."
          runbook_url: "doc/05-observability-stack.md"

      - alert: ZTAKongLatencyP95High
        expr: |
          histogram_quantile(0.95,
            sum by (service, le) (rate(kong_latency_bucket[5m]))
          ) > 1000
        for: 5m
        labels:
          severity: warning
          team: gateway
        annotations:
          summary: "Kong service {{ $labels.service }} p95 latency {{ $value }}ms"
          description: "Upstream is slow (>1s p95). Saturation, GC pause, DB-creds wait, or DoS attempt."
          runbook_url: "doc/05-observability-stack.md"

      - alert: ZTAKongJWTAuthFailureSpike
        expr: |
          sum by (consumer) (
            rate(kong_http_requests_total{code="401"}[5m])
          ) > 10/60
        for: 5m
        labels:
          severity: warning
          team: security
          mitre_tid: T1078
        annotations:
          summary: "JWT auth failures spiking for consumer {{ $labels.consumer }}"
          description: |
            Consumer is seeing > 10 401-responses/min for 5 minutes.
            Either a stale token in a service that needs rotating, or a
            credential-stuffing attempt against a leaked token.
          runbook_url: "doc/api-authentication-guide.md"

    # ----------------------------------------------------------------------
    # PR-O Phase 2: Tetragon kernel-event signals
    #   Metric source: tetragon DaemonSet /metrics on :2112 (PR-N B2 fix).
    #
    #   Label set is limited to (chart 1.7.0 hard-codes the filter):
    #     namespace=<tetragon ns, always kube-system>
    #     pod=<tetragon pod name, ephemeral>
    #     exported_namespace=<target workload's ns>
    #     exported_pod=<target workload's pod>
    #     workload=<target workload's controller name (Deployment/StatefulSet)>
    #     binary=<path of binary exec'ing>
    #     type=PROCESS_EXEC|PROCESS_EXIT|PROCESS_KPROBE|PROCESS_LSM
    #
    #   No `function`, `file`, `policy`, `arg0` labels are exported — see
    #   doc/14-tetragon-runtime.md "Han che metric label". For path/function
    #   level detail use `tetra getevents` against the Tetragon stdout/JSON
    #   export pipeline (Filebeat → ES → Kibana).
    # ----------------------------------------------------------------------
    - name: zta-runtime
      interval: 30s
      rules:
      # Phase 3: replaces ZTATetragonEventRateSpike (>5x baseline) with
      # a z-score alert. Per-workload kernel-event rate compared against
      # its own 1h baseline (mean + stddev). Group by exported_*
      # (target workload), not pod/namespace which on tetragon_events_total
      # refer to the tetragon AGENT pod (ephemeral, on kube-system) —
      # useless for incident triage.
      - alert: ZTATetragonEventRateZScore
        expr: |
          (
            zta:tetragon_events:workload:rate_5m
            - zta:tetragon_events:workload:rate_5m:avg1h
          )
          / clamp_min(zta:tetragon_events:workload:rate_5m:stddev1h, 0.001)
          > 3
          and on() (sum(zta:tetragon_events:workload:rate_5m) > 0.5)
        for: 10m
        labels:
          severity: warning
          team: security
          mitre_tid: T1059
        annotations:
          summary: "Tetragon event z-score in {{ $labels.exported_namespace }}/{{ $labels.workload }}, pod {{ $labels.exported_pod }} ({{ $value | printf \"%.1f\" }} sigma)"
          description: |
            Per-workload kernel event rate is >3 sigma above its 1h
            baseline. Inspect with `kubectl exec -n kube-system
            <tetragon-pod> -c tetragon -- tetra getevents -o compact
            --namespace {{ $labels.exported_namespace }} --pod
            {{ $labels.exported_pod }}`.
          runbook_url: "doc/14-tetragon-runtime.md"

      # Phase 3 tuning: previous rule fired on EVERY shell exec (> 0),
      # which generated 5-7 false positives per minute (one per healthchecked
      # workload — k8s livenessProbe / readinessProbe routinely invokes
      # `/bin/sh -c ...`). Threshold raised to > 0.1/s sustained over 2m
      # = >12 exec/min, well above any reasonable healthcheck baseline
      # (most healthcheck cadences are 10-30s = 0.03-0.1/s).
      #
      # If a real attacker enters a workload via exec, they spawn shells
      # back-to-back (loops, tab-completion, history navigation) and
      # easily exceed 0.1/s.
      - alert: ZTATetragonShellExec
        expr: |
          sum by (exported_pod, exported_namespace, workload, binary) (
            rate(tetragon_events_total{type="PROCESS_EXEC", exported_namespace="job7189-apps", binary=~"/(usr/)?bin/(ash|sh|bash|zsh|dash|busybox)"}[2m])
          ) > 0.1
        for: 2m
        labels:
          severity: critical
          team: security
          mitre_tid: T1059
        annotations:
          summary: "Shell exec spike inside workload {{ $labels.exported_namespace }}/{{ $labels.exported_pod }} ({{ $labels.binary }} at {{ $value | printf \"%.2f\" }}/s)"
          description: |
            Tetragon recorded sustained shell-binary spawns (>0.1/s for 2m)
            inside a job7189-apps workload (`{{ $labels.workload }}`).
            Above the healthcheck baseline — likely interactive session or
            scripted attack loop. PROCESS_EXEC fires regardless of
            TracingPolicy. Freeze the pod and capture forensics with
            `kubectl exec -n kube-system <tetragon-pod> -- tetra getevents -o compact --namespace {{ $labels.exported_namespace }} --pod {{ $labels.exported_pod }}`.
          runbook_url: "doc/14-tetragon-runtime.md"

      # Phase 3: catch sudden burst of shell execs (>1/s, ~60+ exec/min)
      # within 1 minute window. Distinct from the sustained alert above —
      # this fires on the FIRST minute of a scripted attack loop, before
      # 2m duration accrues.
      - alert: ZTATetragonShellExecBurst
        expr: |
          sum by (exported_pod, exported_namespace, workload, binary) (
            rate(tetragon_events_total{type="PROCESS_EXEC", exported_namespace="job7189-apps", binary=~"/(usr/)?bin/(ash|sh|bash|zsh|dash|busybox)"}[1m])
          ) > 1
        for: 1m
        labels:
          severity: critical
          team: security
          mitre_tid: T1059
        annotations:
          summary: "Shell exec BURST in {{ $labels.exported_namespace }}/{{ $labels.exported_pod }} ({{ $value | printf \"%.1f\" }}/s)"
          description: |
            >1 shell exec per second sustained for 1m — almost certainly
            an attacker loop (init scripts use slower cadences and stop
            after first failure). Quarantine the pod immediately.
          runbook_url: "doc/14-tetragon-runtime.md"

      # NOTE: chart 1.7.0 does not export `file` label on tetragon_events_total
      # so we cannot alert on a specific path via metric. Instead, alert on any
      # PROCESS_KPROBE event in job7189-apps — the only Namespaced TracingPolicy
      # there with a kprobe hook is `monitor-sensitive-files`, so a non-zero rate
      # implies a sensitive-path match. (`block-suspicious-exec` is also kprobe
      # but its event_type emits as PROCESS_KPROBE only on a matched shell exec,
      # which is *also* worth alerting on — either path is critical.)
      - alert: ZTATetragonSensitiveFileRead
        expr: |
          sum by (exported_pod, exported_namespace, workload) (
            rate(tetragon_events_total{type="PROCESS_KPROBE", exported_namespace="job7189-apps"}[2m])
          ) > 0
        for: 1m
        labels:
          severity: critical
          team: security
          mitre_tid: T1556
        annotations:
          summary: "Tetragon kprobe match in {{ $labels.exported_namespace }}/{{ $labels.exported_pod }} (sensitive-file or suspicious-exec)"
          description: |
            Tetragon TracingPolicy `monitor-sensitive-files` or
            `block-suspicious-exec` matched in workload `{{ $labels.workload }}`.
            Chart 1.7.0 metric does not expose path/function labels — use
            `tetra getevents` to retrieve the exact file path and kprobe call:
            `kubectl exec -n kube-system <tetragon-pod> -c tetragon -- tetra getevents -o compact --namespace {{ $labels.exported_namespace }} --pod {{ $labels.exported_pod }}`.
            Quarantine the pod and rotate any credential it may have read.
          runbook_url: "doc/14-tetragon-runtime.md"

      # NOTE: chart 1.7.0 does not export `function` label, so we cannot scope
      # this to `security_kernel_module_request` via metric alone. The cluster-
      # wide TracingPolicy `monitor-kernel-module-load` hooks ONLY that LSM
      # function, but the metric series for ANY kprobe match looks identical.
      #
      # Filtering strategy:
      #   - `exported_namespace=""` (host namespace) — module loads happen here
      #     because no pod context is attached to the calling process.
      #   - Exclude legitimate host binaries that match block-suspicious-exec
      #     kprobe via container-launch path (runc/containerd-shim invoke
      #     sys_execve with /bin/sh argv when starting any container) — these
      #     are NOT module-load events. Whitelist tuned against the cluster's
      #     observed binary set (kubelet, containerd, runc, crun, conmon).
      #   - Confirm function name post-fire with `tetra getevents`.
      - alert: ZTATetragonKernelModuleLoad
        expr: |
          sum by (exported_pod, exported_namespace, workload, binary) (
            rate(tetragon_events_total{
              type="PROCESS_KPROBE",
              exported_namespace="",
              binary!~"/usr/s?bin/(runc|containerd|containerd-shim.*|crun|conmon|kubelet)|/opt/cni/.*"
            }[2m])
          ) > 0
        for: 1m
        labels:
          severity: critical
          team: security
          mitre_tid: T1611
        annotations:
          summary: "Tetragon kprobe match in host namespace (binary {{ $labels.binary }})"
          description: |
            Likely a kernel-module load (the only cluster-wide kprobe policy
            installed is `monitor-kernel-module-load`). Container should not
            have CAP_SYS_MODULE; this is a strong container-escape signal.
            Confirm function name with
            `kubectl exec -n kube-system <tetragon-pod> -c tetragon -- tetra getevents -o compact`.
          runbook_url: "doc/14-tetragon-runtime.md"

    # ----------------------------------------------------------------------
    # PR-O Phase 2: supply-chain (CDM) + identity-trust signals
    # ----------------------------------------------------------------------
    - name: zta-cdm-trust
      interval: 30s
      rules:
      - alert: ZTACosignAdmissionDenied
        expr: |
          sum by (namespace) (
            rate(policy_controller_admission_decisions_total{decision="deny"}[5m])
          ) > 0
        for: 2m
        labels:
          severity: critical
          team: security
          mitre_tid: T1543
        annotations:
          summary: "Cosign policy-controller denied admission in {{ $labels.namespace }}"
          description: |
            An unsigned image (or image whose signature failed Cosign
            verification) was attempted in {{ $labels.namespace }}.
            Inspect with `kubectl get events -n {{ $labels.namespace }} | grep policy-controller` and verify the image is built+signed by the
            project's release pipeline.
          runbook_url: "doc/28-sigstore-policy-controller.md"

      - alert: ZTASpireAttestFailureRate
        expr: |
          sum by (instance) (
            rate(spire_server_node_attestor_failure_total[5m])
          ) > 0.2
        for: 5m
        labels:
          severity: warning
          team: security
          mitre_tid: T1078
        annotations:
          summary: "SPIRE attestation failures on {{ $labels.instance }} ({{ $value }}/s)"
          description: |
            Node-attestation is failing > 12/min sustained. Possible
            causes: agent-server clock skew, trust bundle mismatch
            (re-bootstrap), or an attacker workload presenting an
            invalid selector.
          runbook_url: "doc/27-spire-workload-attestation.md"

      - alert: ZTACertExpirySoon
        expr: |
          certmanager_certificate_expiration_timestamp_seconds
            - time() < 7 * 24 * 60 * 60
        for: 1h
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Cert {{ $labels.name }} ({{ $labels.namespace }}) expires in < 7 days"
          description: "cert-manager will rotate automatically, but if the cert is older than the issuer config something is wrong. Check `kubectl describe certificate -n {{ $labels.namespace }} {{ $labels.name }}`."
          runbook_url: "doc/15-encryption-mtls-spiffe.md"

    # ----------------------------------------------------------------------
    # Phase 3: recording rules backing Tier-2 z-score alerts.
    #
    # Why recording rules: the z-score alerts above reference an
    # `avg_over_time` + `stddev_over_time` subquery over a 1h window. If
    # we put those inline in each alert expr, Prometheus would re-compute
    # them every evaluation tick (30s) per series. Recording rules pre-
    # compute the rolling baseline ONCE per evaluation, so each alert
    # only does a single divide + comparison.
    #
    # Naming convention: `zta:<source_metric>:<grouping>:<window>` per
    # Prometheus best practice. `:avg1h` and `:stddev1h` suffixes are
    # the 1h rolling baselines for z-score computation.
    #
    # Cold-start behaviour: during the first 1h after deploy the
    # `*:avg1h` and `*:stddev1h` series ramp up from empty. The alert
    # expressions are gated by `clamp_min(stddev1h, 0.001)` so a zero
    # stddev never explodes the z-score, and by an absolute lower bound
    # (e.g. `> 0.5`) so trivially-low traffic doesn't trigger.
    # ----------------------------------------------------------------------
    - name: zta-baselines
      interval: 30s
      rules:
      # Hubble cross-tier drops (per source_namespace → destination_namespace)
      - record: zta:hubble_drop:cross_tier:rate_5m
        expr: |
          sum by (source_namespace, destination_namespace) (
            rate(hubble_drop_total[5m])
          )
      - record: zta:hubble_drop:cross_tier:rate_5m:avg1h
        expr: avg_over_time(zta:hubble_drop:cross_tier:rate_5m[1h])
      - record: zta:hubble_drop:cross_tier:rate_5m:stddev1h
        expr: stddev_over_time(zta:hubble_drop:cross_tier:rate_5m[1h])

      # Kong per-service request rate baseline
      - record: zta:kong_http_requests:service:rate_5m
        expr: |
          sum by (service) (
            rate(kong_http_requests_total[5m])
          )
      - record: zta:kong_http_requests:service:rate_5m:avg1h
        expr: avg_over_time(zta:kong_http_requests:service:rate_5m[1h])
      - record: zta:kong_http_requests:service:rate_5m:stddev1h
        expr: stddev_over_time(zta:kong_http_requests:service:rate_5m[1h])

      # Tetragon per-workload kernel event rate baseline
      - record: zta:tetragon_events:workload:rate_5m
        expr: |
          sum by (exported_pod, exported_namespace, workload) (
            rate(tetragon_events_total[5m])
          )
      - record: zta:tetragon_events:workload:rate_5m:avg1h
        expr: avg_over_time(zta:tetragon_events:workload:rate_5m[1h])
      - record: zta:tetragon_events:workload:rate_5m:stddev1h
        expr: stddev_over_time(zta:tetragon_events:workload:rate_5m[1h])
