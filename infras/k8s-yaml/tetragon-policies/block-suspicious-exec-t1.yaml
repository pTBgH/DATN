# =============================================================================
# PR #12 — Adaptive Security Loop (PEP Runtime)
# TracingPolicy: block-suspicious-exec-t1
#
# IMPORTANT — action downgraded to Post (2026-05-20):
# The previous version used `action: Sigkill` on `/bin/sh`/`/bin/bash` exec
# inside T1 namespaces (vault, data, security). In practice this killed the
# Vault probe (`exec ["/bin/sh","-c","vault status..."]`), the MySQL container
# entry (`exec ["/bin/sh","/entrypoint.sh"]`), the Keycloak start script, and
# `kubectl exec` recovery sessions. Symptom: vault-0 entered a probe-fail
# → kubelet restart loop within seconds of policy apply, then cascaded into
# the whole namespace (kubectl exec returning exit 137) — see
# knowledge-base/incident-vault-tetragon-redis-cascade.md.
#
# Strategy:
#  - Keep audit visibility by switching to `action: Post`.
#  - Drop /usr/bin/socat /usr/bin/ssh from the value list (not installed in
#    any of the official images we ship; they were noise).
#  - Re-introduce Sigkill ONLY after layering a `matchBinaries` whitelist for
#    legitimate parents (vault, kubelet probe wrappers, etc.) — see the
#    commented-out block in block-suspicious-exec.yaml.
#
# Cluster-shape: one namespaced policy per T1 namespace (Tetragon does not
# support k8s label selectors; we approximate by per-namespace policies).
# =============================================================================
apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: block-suspicious-exec
  namespace: vault
spec:
  kprobes:
  - call: "sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string"
    selectors:
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "/bin/sh"
        - "/bin/bash"
        - "/usr/bin/curl"
        - "/usr/bin/wget"
        - "/usr/bin/nc"
        - "/usr/bin/ncat"
        - "/usr/bin/nmap"
      matchActions:
      - action: Post
---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: block-suspicious-exec
  namespace: data
spec:
  kprobes:
  - call: "sys_execve"
    syscall: true
