# =============================================================================
# PR #12 — Adaptive Security Loop (PEP Runtime)
# TracingPolicy: block-suspicious-exec-t1
#
# Selective Sigkill enforcement layered for Tier-1 namespaces (vault, data, security):
# - Block highly suspicious hacking and networking tools immediately using Sigkill.
# - Audit other utilities (sh, bash, curl, wget) using Post to prevent probe-fail loops.
# =============================================================================
apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: block-suspicious-exec
  namespace: vault
spec:
  kprobes:
  - call: "sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string"
    selectors:
    # Block highly suspicious hacking and networking tools immediately using Sigkill
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "/usr/bin/nc"
        - "/bin/nc"
        - "/usr/bin/ncat"
        - "/usr/bin/nmap"
        - "/usr/bin/socat"
        - "/bin/socat"
      matchActions:
      - action: Sigkill
    # Audit other utilities that are used by system probes and init scripts using Post
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "/bin/sh"
        - "/bin/bash"
        - "/usr/bin/curl"
        - "/usr/bin/wget"
      matchActions:
      - action: Post
---
