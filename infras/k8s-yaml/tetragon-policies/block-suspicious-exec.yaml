# Namespace-scoped policy → fires ONLY for pods in job7189-apps.
# Replaces previous TracingPolicy + matchNamespaces[namespace=job7189-apps],
# which was schema-invalid: matchNamespaces filters Linux kernel namespaces
# (Mnt/Pid/Net/...), not Kubernetes namespaces.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: block-suspicious-exec
  namespace: job7189-apps
spec:
  kprobes:
  - call: "sys_execve"
    syscall: true
    args:
    - index: 0
      type: "string"
    selectors:
    # Tetragon has no "In" operator. "Equal" with a list of values does
    # OR-match: triggers if arg equals ANY of the listed values.
    - matchArgs:
      - index: 0
        operator: "Equal"
        values:
        - "/bin/sh"
        - "/bin/bash"
        - "/usr/bin/curl"
        - "/usr/bin/wget"
        - "/usr/bin/nc"
        - "/usr/bin/ncat"
        - "/usr/bin/nmap"
      matchActions:
      - action: Sigkill
