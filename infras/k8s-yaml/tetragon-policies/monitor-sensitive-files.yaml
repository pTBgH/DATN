# Namespace-scoped — only fires for pods in job7189-apps.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: monitor-sensitive-files
  namespace: job7189-apps
spec:
  kprobes:
  - call: "sys_openat"
    syscall: true
    args:
    - index: 1
      type: "string"
    selectors:
    - matchArgs:
      - index: 1
        operator: "Prefix"
        values:
        - "/etc/shadow"
        - "/etc/passwd"
        - "/proc/self/environ"
        - "/var/run/secrets/kubernetes.io"
      matchActions:
      - action: Post
