# =============================================================================
# RBAC for threat-intel CronJob.
#
# Two scopes:
#   1. Namespaced Role: write ConfigMap threat-intel-blocklist (data
#      cache + annotations) in security-cdm.
#   2. ClusterRole (resourceNames pinned to threat-intel-firehol):
#      patch CiliumCIDRGroup so the CCNP cnp-threat-intel-egress-deny
#      picks up fresh CIDRs. The resourceNames pin enforces least
#      privilege — the SA can only mutate this exact CIDR group, not
#      other cluster-wide Cilium resources.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: threat-intel-updater
  namespace: security-cdm
  labels:
    cilium.zta/tier: T1
    cilium.zta/source: threat-intel
    cilium.zta/destination: external-feeds
    cilium.zta/role: security
    cilium.zta/owner: security-team
    cilium.zta/sensitivity: confidential
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: threat-intel-cm-writer
  namespace: security-cdm
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: threat-intel-cm-writer
  namespace: security-cdm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: threat-intel-cm-writer
subjects:
- kind: ServiceAccount
  name: threat-intel-updater
  namespace: security-cdm
---
# Cluster-scoped patch on exactly one CiliumCIDRGroup. The `get` verb is
# needed for the post-patch sanity check; `patch` performs the actual
# update. `list`/`watch` are deliberately omitted — the CronJob never
# enumerates CIDR groups.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: threat-intel-cidrgroup-patcher
  labels:
    app: threat-intel
    cilium.zta/role: security
rules:
- apiGroups: ["cilium.io"]
  resources: ["ciliumcidrgroups"]
  resourceNames: ["threat-intel-firehol"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: threat-intel-cidrgroup-patcher
  labels:
    app: threat-intel
    cilium.zta/role: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: threat-intel-cidrgroup-patcher
subjects:
- kind: ServiceAccount
  name: threat-intel-updater
  namespace: security-cdm
---
# Namespaced Role in kube-system: patch ONLY the coredns-sinkhole
# ConfigMap. The CronJob populates this CM hourly with URLhaus host
# entries (`0.0.0.0 <fqdn>` per line) so the CoreDNS `hosts` plugin
# can sinkhole DNS queries for known-bad FQDNs cluster-wide
# (Decision 3 pivot — Cilium 1.19 has no egressDeny.toFQDNs).
#
# The resourceNames pin keeps the CronJob's blast radius tight — it
# can mutate this exact ConfigMap and nothing else in kube-system.
# Notably the `coredns` Corefile CM is NOT in scope; that file is
# owned by the operator and patched once at deploy time only.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: threat-intel-coredns-sinkhole-patcher
  namespace: kube-system
  labels:
    app: threat-intel
    cilium.zta/role: security
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["coredns-sinkhole"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: threat-intel-coredns-sinkhole-patcher
  namespace: kube-system
  labels:
    app: threat-intel
    cilium.zta/role: security
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: threat-intel-coredns-sinkhole-patcher
subjects:
- kind: ServiceAccount
  name: threat-intel-updater
  namespace: security-cdm
