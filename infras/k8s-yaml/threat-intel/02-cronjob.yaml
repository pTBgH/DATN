# =============================================================================
# CronJob: threat-intel-refresh
#
# Runs hourly. Fetches FireHOL Level1 (IP blocklist) and URLhaus (FQDN
# blocklist), deduplicates, and writes results to ConfigMap
# threat-intel-blocklist in security-cdm namespace.
#
# The ConfigMap is consumed by CCNP cnp-threat-intel-egress-deny to block
# egress to known-bad IPs and domains cluster-wide.
#
# Reference: doc/zta-gap-decision.md (Decision 3)
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: threat-intel-refresh
  namespace: security-cdm
  labels:
    app: threat-intel-refresh
    cilium.zta/tier: T1
    cilium.zta/source: threat-intel
    cilium.zta/destination: external-feeds
    cilium.zta/role: security
    cilium.zta/owner: security-team
    cilium.zta/sensitivity: confidential
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      # 600s gives breathing room for first-time pulls of fetch-feeds (curl)
      # and apply-configmap (alpine/k8s ~850MB) containers + 60s pre-fetch
      # Cilium L7 DNS settle + ~100s worth of curl retries.
      activeDeadlineSeconds: 600
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: threat-intel-refresh
            cilium.zta/tier: T1
            cilium.zta/source: threat-intel
            cilium.zta/destination: external-feeds
            cilium.zta/role: security
            cilium.zta/owner: security-team
            cilium.zta/sensitivity: confidential
        spec:
          serviceAccountName: threat-intel-updater
          restartPolicy: OnFailure
          volumes:
          - name: feeds
            emptyDir: {}
          initContainers:
          - name: fetch-feeds
            image: curlimages/curl:8.5.0
            command: ["/bin/sh", "-c"]
            # Fetch external blocklists with explicit retry handling. Two
            # important reliability concerns are addressed here:
            #
            # 1. Cilium L7 DNS proxy race: when the threat-intel CNP is freshly
            #    applied, the Cilium agent may not yet have programmed the L7
            #    DNS proxy for the pod's identity by the time curl runs. The
            #    initial sleep + curl --retry-all-errors gives the agent time
            #    to install the policy before we give up on resolution.
            #
            # 2. set -o pipefail: the previous version used `set -eu` without
            #    pipefail, so `curl | grep | sort | head` succeeded with an
            #    empty file even when curl exited 6 (DNS error). The init
            #    container then "succeeded" with 0 CIDRs/FQDNs, leaving an
            #    empty ConfigMap and a CronJob that looked healthy. We now
            #    fail loudly so the parent CronJob retries on next schedule
            #    and the operator gets a real diagnostic.
            args:
            - |
              set -euo pipefail
              # Give Cilium agent time to program the freshly-applied CNP /
              # CCNP before issuing DNS queries through the L7 proxy.
              #
              # Empirically 15s was not enough on this cluster: the very first
              # init run after `zta-deploy-threat-intel.sh` (which freshly
              # applies the threat-intel CNP/CCNP) consistently failed with
              # `curl: (6) Could not resolve host` because the L7 DNS proxy
              # redirect for the threat-intel pod's identity had not been
              # programmed by the cilium-agent yet. 60s is safely above the
              # observed convergence window on a 3-node 1.19.4 cluster and
              # still well inside the Job activeDeadlineSeconds (600s).
              SETTLE_S="${POLICY_SETTLE_S:-60}"
              echo "[threat-intel] Waiting ${SETTLE_S}s for Cilium L7 DNS proxy to settle..."
              sleep "$SETTLE_S"

              # Helper: download URL with retries, --compressed (so the CDN
              # cannot ship a gzip-encoded body that curl forwards verbatim
              # to disk — observed empirically on raw.githubusercontent.com),
              # and report curl exit code + downloaded byte count.
              fetch() {
                local url="$1" out="$2"
                curl -sSL --compressed \
                  --max-time 90 --retry 5 --retry-delay 10 \
                  --retry-all-errors --connect-timeout 15 \
                  -o "$out" "$url"
              }

              echo "[threat-intel] Fetching FireHOL Level1..."
              firehol_ok=0
              if fetch \
                   "https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_level1.netset" \
                   /feeds/firehol.raw; then
                firehol_ok=1
              else
                echo "[threat-intel] FireHOL fetch failed after retries (curl exit $?)"
                : > /feeds/firehol.raw
              fi
              firehol_bytes=$(wc -c < /feeds/firehol.raw | tr -d ' ')
              echo "[threat-intel] FireHOL raw: ${firehol_bytes} bytes"
              if [ "$firehol_bytes" -lt 100 ]; then
                echo "[threat-intel] FireHOL raw head(200B): $(head -c 200 /feeds/firehol.raw | od -An -c | tr -s ' ' | head -3)"
              fi
              # NOTE: head MUST NOT be the last stage of a pipe under
              # `set -o pipefail`. head closes its input early, sort then
              # gets SIGPIPE and exits 141, the whole pipeline reports
              # non-zero, and the `|| : > /feeds/firehol.txt` fallback
              # truncates the (already-written) firehol.txt file. The
              # race is timing-dependent on busybox sort, so on some
              # runs the file kept 2000 lines and on others it was
              # truncated to 0 — empirically reproduced 0/2000 from
              # consecutive runs against an identical input file.
              # Fix: write sort output to a tmpfile and take head from
              # that file (no pipe → no SIGPIPE).
              grep -E '^[0-9]+\.' /feeds/firehol.raw 2>/dev/null \
                | sort -u > /feeds/firehol.sorted || : > /feeds/firehol.sorted
              head -2000 /feeds/firehol.sorted > /feeds/firehol.txt
              firehol_count=$(wc -l < /feeds/firehol.txt | tr -d ' ')
              echo "[threat-intel] FireHOL: ${firehol_count} CIDRs (fetch_ok=${firehol_ok})"

              echo "[threat-intel] Fetching URLhaus blocklist..."
              urlhaus_ok=0
              if fetch \
                   "https://urlhaus.abuse.ch/downloads/hostfile/" \
                   /feeds/urlhaus.raw; then
                urlhaus_ok=1
              else
                echo "[threat-intel] URLhaus fetch failed after retries (curl exit $?)"
                : > /feeds/urlhaus.raw
              fi
              urlhaus_bytes=$(wc -c < /feeds/urlhaus.raw | tr -d ' ')
              echo "[threat-intel] URLhaus raw: ${urlhaus_bytes} bytes"
              # Same SIGPIPE+pipefail trap as the FireHOL pipeline above —
              # apply the same write-then-head fix here so the URLhaus
              # extractor stays robust if the feed ever grows past the
              # head cap.
              grep -E '^127\.0\.0\.1' /feeds/urlhaus.raw 2>/dev/null \
                | awk '{print $2}' | grep -v '^#' | sort -u \
                > /feeds/urlhaus.sorted || : > /feeds/urlhaus.sorted
              head -1000 /feeds/urlhaus.sorted > /feeds/urlhaus.txt
              urlhaus_count=$(wc -l < /feeds/urlhaus.txt | tr -d ' ')
              echo "[threat-intel] URLhaus: ${urlhaus_count} FQDNs (fetch_ok=${urlhaus_ok})"

              # Fail-loud: if BOTH feeds came up empty AND both fetches failed,
              # surface that to the Job controller so backoffLimit kicks in and
              # the operator sees Failed=True instead of a silent empty-CM run.
              # If at least one feed has data, proceed — partial coverage is
              # better than no coverage.
              if [ "$firehol_ok" -eq 0 ] && [ "$urlhaus_ok" -eq 0 ]; then
                echo "[threat-intel] FATAL: both feeds failed to fetch — exiting non-zero"
                echo "[threat-intel] CronJob will retry on next schedule (hourly)"
                exit 1
              fi
            volumeMounts:
            - name: feeds
              mountPath: /feeds
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "128Mi"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
          containers:
          - name: apply-configmap
            # alpine/k8s ships kubectl + helm + jq on Alpine. Replaces the
            # previously-used `bitnami/kubectl:1.29` which was removed from
            # Docker Hub when Bitnami deprecated its free image catalog in
            # August 2025.
            image: alpine/k8s:1.29.10
            command: ["/bin/bash", "-c"]
            args:
            - |
              set -euo pipefail
              FIREHOL_COUNT=$(wc -l < /feeds/firehol.txt | tr -d ' ')
              URLHAUS_COUNT=$(wc -l < /feeds/urlhaus.txt | tr -d ' ')
              TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              echo "[threat-intel] Building ConfigMap: CIDR=$FIREHOL_COUNT FQDN=$URLHAUS_COUNT"

              {
                echo "apiVersion: v1"
                echo "kind: ConfigMap"
                echo "metadata:"
                echo "  name: threat-intel-blocklist"
                echo "  namespace: security-cdm"
                echo "  labels:"
                echo "    app: threat-intel"
                echo "    cilium.zta/tier: T1"
                echo "  annotations:"
                echo "    threat-intel/last-updated: \"$TIMESTAMP\""
                echo "    threat-intel/firehol-count: \"$FIREHOL_COUNT\""
                echo "    threat-intel/urlhaus-count: \"$URLHAUS_COUNT\""
                echo "data:"
                echo "  cidr-list: |"
                sed 's/^/    /' /feeds/firehol.txt
                echo "  fqdn-list: |"
                sed 's/^/    /' /feeds/urlhaus.txt
              } > /tmp/threat-intel-cm.yaml

              kubectl apply -f /tmp/threat-intel-cm.yaml

              # ---------------------------------------------------------------
              # Wire ConfigMap data into CCNP by patching CiliumCIDRGroup
              # threat-intel-firehol (referenced by CCNP
              # cnp-threat-intel-egress-deny via toCIDRSet.cidrGroupRef).
              #
              # We patch the CIDRGroup, NOT the CCNP itself — the CronJob's
              # SA has `patch` on this single CIDRGroup only (via
              # resourceNames in the ClusterRole), so even a compromised
              # CronJob can't tamper with the policy intent.
              #
              # Skip the patch when FIREHOL_COUNT=0 so a transient feed
              # failure does not wipe the active blocklist. The hourly
              # CronJob will refresh on the next successful run.
              # ---------------------------------------------------------------
              if [ "$FIREHOL_COUNT" -gt 0 ]; then
                echo "[threat-intel] Patching CiliumCIDRGroup threat-intel-firehol with $FIREHOL_COUNT CIDRs..."
                jq -Rs 'split("\n") | map(select(length > 0)) | {spec: {externalCIDRs: .}}' \
                  /feeds/firehol.txt > /tmp/cidrgroup-patch.json
                kubectl patch ciliumcidrgroup threat-intel-firehol \
                  --type=merge --patch-file=/tmp/cidrgroup-patch.json
                # Use -o json + jq instead of -o jsonpath because kubectl's
                # jsonpath renders arrays in Go-format (space-separated),
                # which jq cannot parse directly.
                applied=$(kubectl get ciliumcidrgroup threat-intel-firehol -o json \
                  | jq '.spec.externalCIDRs | length')
                echo "[threat-intel] CiliumCIDRGroup now holds $applied CIDRs"
              else
                echo "[threat-intel] FIREHOL_COUNT=0 — skipping CIDRGroup patch to preserve existing blocklist"
              fi

              echo "[threat-intel] Done. CIDR=$FIREHOL_COUNT FQDN=$URLHAUS_COUNT updated=$TIMESTAMP"
            volumeMounts:
            - name: feeds
              mountPath: /feeds
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "128Mi"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
