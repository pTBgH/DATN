# =============================================================================
# CronJob: threat-intel-refresh
#
# Runs hourly. Fetches FireHOL Level1 (IP blocklist) and URLhaus (FQDN
# blocklist), deduplicates, and writes results to ConfigMap
# threat-intel-blocklist in security-cdm namespace.
#
# The ConfigMap is consumed by CCNP cnp-threat-intel-egress-deny to block
# egress to known-bad IPs and domains cluster-wide.
#
# Reference: doc/zta-gap-decision.md (Decision 3)
# =============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: threat-intel-refresh
  namespace: security-cdm
  labels:
    app: threat-intel-refresh
    cilium.zta/tier: T1
    cilium.zta/source: threat-intel
    cilium.zta/destination: external-feeds
    cilium.zta/role: security
    cilium.zta/owner: security-team
    cilium.zta/sensitivity: confidential
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: threat-intel-refresh
            cilium.zta/tier: T1
            cilium.zta/source: threat-intel
            cilium.zta/destination: external-feeds
            cilium.zta/role: security
            cilium.zta/owner: security-team
            cilium.zta/sensitivity: confidential
        spec:
          serviceAccountName: threat-intel-updater
          restartPolicy: OnFailure
          volumes:
          - name: feeds
            emptyDir: {}
          initContainers:
          - name: fetch-feeds
            image: curlimages/curl:8.5.0
            command: ["/bin/sh", "-c"]
            args:
            - |
              set -eu
              echo "[threat-intel] Fetching FireHOL Level1..."
              curl -sSL --max-time 60 \
                "https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_level1.netset" \
                | grep -E '^[0-9]+\.' | sort -u | head -2000 > /feeds/firehol.txt
              echo "[threat-intel] FireHOL: $(wc -l < /feeds/firehol.txt) CIDRs"

              echo "[threat-intel] Fetching URLhaus blocklist..."
              curl -sSL --max-time 60 \
                "https://urlhaus.abuse.ch/downloads/hostfile/" \
                | grep -E '^127\.0\.0\.1' | awk '{print $2}' \
                | grep -v '^#' | sort -u | head -1000 > /feeds/urlhaus.txt
              echo "[threat-intel] URLhaus: $(wc -l < /feeds/urlhaus.txt) FQDNs"
            volumeMounts:
            - name: feeds
              mountPath: /feeds
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "128Mi"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
          containers:
          - name: apply-configmap
            image: bitnami/kubectl:1.29
            command: ["/bin/bash", "-c"]
            args:
            - |
              set -euo pipefail
              FIREHOL_COUNT=$(wc -l < /feeds/firehol.txt | tr -d ' ')
              URLHAUS_COUNT=$(wc -l < /feeds/urlhaus.txt | tr -d ' ')
              TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              echo "[threat-intel] Building ConfigMap: CIDR=$FIREHOL_COUNT FQDN=$URLHAUS_COUNT"

              {
                echo "apiVersion: v1"
                echo "kind: ConfigMap"
                echo "metadata:"
                echo "  name: threat-intel-blocklist"
                echo "  namespace: security-cdm"
                echo "  labels:"
                echo "    app: threat-intel"
                echo "    cilium.zta/tier: T1"
                echo "  annotations:"
                echo "    threat-intel/last-updated: \"$TIMESTAMP\""
                echo "    threat-intel/firehol-count: \"$FIREHOL_COUNT\""
                echo "    threat-intel/urlhaus-count: \"$URLHAUS_COUNT\""
                echo "data:"
                echo "  cidr-list: |"
                sed 's/^/    /' /feeds/firehol.txt
                echo "  fqdn-list: |"
                sed 's/^/    /' /feeds/urlhaus.txt
              } > /tmp/threat-intel-cm.yaml

              kubectl apply -f /tmp/threat-intel-cm.yaml
              echo "[threat-intel] Done. CIDR=$FIREHOL_COUNT FQDN=$URLHAUS_COUNT updated=$TIMESTAMP"
            volumeMounts:
            - name: feeds
              mountPath: /feeds
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "128Mi"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
