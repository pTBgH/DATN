# =============================================================================
# CiliumClusterwideNetworkPolicy: threat-intel egress deny
#
# Blocks egress to known-bad CIDRs cluster-wide. The CIDR list itself
# lives in CiliumCIDRGroup `threat-intel-firehol` (manifest 05) and is
# patched hourly by the threat-intel CronJob from the FireHOL Level1
# blocklist. This policy holds the static intent ("deny anything in the
# named group"); the group holds the dynamic data.
#
# Reference: doc/zta-gap-decision.md (Decision 3)
# =============================================================================
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: cnp-threat-intel-egress-deny
spec:
  description: "Deny egress to known-bad IPs (FireHOL Level1, via CIDR group) — updated hourly by CronJob"
  endpointSelector: {}
  # CRITICAL: enableDefaultDeny.egress=false is required here.
  #
  # Cilium default behaviour: any policy whose endpointSelector matches an
  # endpoint and which contains egress rules (allow OR deny) flips that
  # endpoint into "policy-enforced for egress" mode. In that mode, only
  # explicitly-allowed egress is permitted; everything else is dropped.
  #
  # With endpointSelector: {} (= every endpoint cluster-wide) and only
  # egressDeny rules, every pod in the cluster gets flipped to
  # policy-enforced egress with no allow rule from this policy. Pods that
  # do not have their own allow-egress CNP (most notably coredns in
  # kube-system) lose ALL upstream egress, including DNS to 8.8.8.8 /
  # Tailscale MagicDNS — which silently breaks DNS resolution for the
  # entire cluster.
  #
  # Setting enableDefaultDeny.egress=false makes this policy purely
  # additive: it only contributes explicit deny rules for the CIDRs in
  # the referenced group without altering each endpoint's default-allow /
  # default-deny posture (that posture continues to be governed by
  # per-namespace CNPs, e.g. default-deny-<ns> + allow-*).
  # Microsegmentation is preserved, and the deny rules still apply
  # because deny takes precedence over allow.
  #
  # Ref: https://docs.cilium.io/en/stable/security/policy/intro/#default-deny
  enableDefaultDeny:
    egress: false
    ingress: false
  egressDeny:
  # Reference the CIDR group instead of an inline list. The CronJob
  # patches CiliumCIDRGroup/threat-intel-firehol's spec.externalCIDRs;
  # this policy automatically picks up the change without needing
  # cluster-scoped RBAC on the CCNP itself.
  - toCIDRSet:
    - cidrGroupRef: "threat-intel-firehol"
