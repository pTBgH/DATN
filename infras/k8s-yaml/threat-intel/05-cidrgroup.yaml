# =============================================================================
# CiliumCIDRGroup: threat-intel-firehol
#
# Holds the FireHOL Level1 CIDR list as data, decoupled from the CCNP
# (policy intent). The threat-intel CronJob patches spec.externalCIDRs
# hourly from the freshly-fetched feed in ConfigMap threat-intel-blocklist.
#
# CCNP cnp-threat-intel-egress-deny references this group via
# spec.egressDeny[].toCIDRSet[].cidrGroupRef.
#
# Design rationale (Option B from Decision 0.2 follow-up):
#   - Smaller RBAC blast radius — the CronJob SA only needs `patch` on
#     this single CIDRGroup (resourceNames: [threat-intel-firehol]),
#     not on the CCNP CRD as a whole.
#   - Cleaner separation: policy intent (CCNP) stays static; CIDR data
#     (this group) is updated by automation.
#   - Modern Cilium pattern (CIDR groups GA from 1.14; cluster runs 1.19.4).
#
# Reference: knowledge-base/zta-gap-decision.md (Decision 3, updated)
# =============================================================================
apiVersion: cilium.io/v2
kind: CiliumCIDRGroup
metadata:
  name: threat-intel-firehol
  labels:
    app: threat-intel
    cilium.zta/tier: T1
    cilium.zta/source: threat-intel
    cilium.zta/destination: external-feeds
    cilium.zta/role: security
    cilium.zta/owner: security-team
    cilium.zta/sensitivity: confidential
spec:
  # IMPORTANT: this manifest is a *skeleton only*. The list below is
  # intentionally empty so a manual `kubectl apply -f 05-cidrgroup.yaml`
  # cannot wipe the live blocklist (kubectl apply uses replace-semantics
  # for lists-of-strings without a patchMergeKey — the YAML list always
  # overwrites the live list). The CronJob's apply-configmap container
  # patches `spec.externalCIDRs` with the freshly-fetched FireHOL CIDRs
  # on every run; that is the *only* writer of this field.
  #
  # Operators: to refresh the blocklist manually, run
  #   kubectl -n security-cdm create job --from=cronjob/threat-intel-refresh \
  #     ti-manual-$(date +%s)
  # — do NOT `kubectl apply -f` this file expecting it to repopulate.
  externalCIDRs: []
