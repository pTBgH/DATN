# =============================================================================
# Namespace: security-cdm — CDM (Continuous Diagnostics & Mitigation) tier
# Step: ZTA Gap Resolution PR-I (Trivy Operator) + PR-K (Threat-Intel feed).
#
# Why a separate namespace from `security`?
#   - `security` holds IAM + admission webhooks (Keycloak, oauth2-proxy,
#     policy-controller, gatekeeper, zta-pdp). CDM workloads scan images and
#     pull large vulnerability DB blobs (~80 MiB) — egress profile differs.
#   - Decision file: doc/zta-gap-decision.md, Quyết định 1 + 3.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: security-cdm
  labels:
    name: security-cdm
    cilium.zta/tier: T1
    cilium.zta/owner: security-team
    cilium.zta/sensitivity: confidential
    pod-security.kubernetes.io/enforce: baseline
