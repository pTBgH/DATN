# Chỉ cài Injector, không cài Vault server mới
server:
  enabled: false

injector:
  enabled: true

  # Trỏ vào Vault server đã có sẵn
  externalVaultAddr: "https://vault.vault.svc.cluster.local:8200"

  # K8s auth path
  authPath: "auth/kubernetes"

  # Bỏ qua TLS verify vì dùng self-signed cert
  agentDefaults:
    extraEnvVars:
    - name: VAULT_SKIP_VERIFY
      value: "true"

  # Resource limits cho injector pod
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
