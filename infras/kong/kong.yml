  #   url: http://phpmyadmin.management.svc.cluster.local:80
  #   routes:
  #     - name: phpmyadmin-root
  #       paths: ["/phpmyadmin/", "/myadmin/", "/db-root/"]
  #       strip_path: true

  - name: phpmyadmin-service
    url: http://phpmyadmin.management.svc.cluster.local:80
    routes:
      - name: phpmyadmin-route
        paths: ["/pma/"]   # hoặc ["/myadmin/"], ["/admin-db/"]
        strip_path: true

  # - name: phpmyadmin-service
  #   url: http://phpmyadmin.management.svc.cluster.local:80
  #   routes:
  #     - name: phpmyadmin-route
  #       paths: ["/db"]
  #       strip_path: true
  #       plugins:
  #         - name: request-transformer   # giữ nếu bạn muốn, nhưng không bắt buộc
  #           config:
  #             add:
  #               headers:
  #                 - "X-Forwarded-Prefix: /db"
  #         - name: response-transformer
  #           config:
  #             rename:
  #               headers:
  #                 - original: Location
  #                   replacement: /db$1   # <-- Đây là phần chính: nếu Location = /xxx thì thành /db/xxx
  #             # Hoặc dùng regex chi tiết hơn (nếu rename không đủ):
  #             # headers:
  #             #   - original: Location
  #             #     replacement: ^/(.*)$ → /db/$1   # regex: bắt đầu bằng / thì thêm /db/
  #             add:
  #               headers: []   # nếu cần thêm header khác
  #             remove:
  #               headers: []   # nếu cần xóa header nào

  # kafbat-service disabled — Kafka UI removed from this lab
  # (see infras/k8s-yaml/03-kafka.yaml Phần 2). To re-enable, uncomment:
  # - name: kafbat-service
  #   url: http://kafbat.management.svc.cluster.local:80
  #   routes:
  #     - name: kafbat-route
  #       paths: ["/kafka"]
  #       strip_path: true

  - name: keycloak-service
    url: http://keycloak.security.svc.cluster.local:8080
    routes:
      - name: keycloak-realms-route
        paths: ["/realms"]
        strip_path: false
      - name: keycloak-resources-route
        paths: ["/resources"]
        strip_path: false
      - name: keycloak-admin-route
        paths: ["/admin"]
        strip_path: false

  # ======================
  # IDENTITY
  # ======================
  - name: identity-service
    url: http://identity-service.job7189-apps.svc.cluster.local:80
    routes:
      - { name: identity-profiles, paths: ["/api/recruiters/profile"], strip_path: false, plugins: [{ name: jwt }] }
      - { name: identity-candidate-profiles, paths: ["/api/candidates/profile"], strip_path: false, plugins: [{ name: jwt }] }
      - { name: identity-admin, paths: ["/api/admin/users"], strip_path: false, plugins: [{ name: jwt }] }
      - { name: identity-health, paths: ["/api/health"], strip_path: false }

  # ======================
  # WORKSPACE
  # ======================
  - name: workspace-service
    url: http://workspace-service.job7189-apps.svc.cluster.local:80
    routes:
      - { name: workspace-core, paths: ["/api/workspaces"], strip_path: false, plugins: [{ name: jwt }] }
      - { name: workspace-invitations, paths: ["/api/invitations"], strip_path: false, plugins: [{ name: jwt }] }
      - { name: workspace-options, paths: ["/api/options/company-types"], strip_path: false }

  # ======================
  # JOB
  # ======================
  - name: job-service
    url: http://job-service.job7189-apps.svc.cluster.local:80
    routes:
      - name: job-workspace-context
        paths: ["~/api/workspaces/[^/]+/jobs"]
        strip_path: false
        plugins: [{ name: jwt }]

      - { name: job-admin, paths: ["/api/admin/jobs"], strip_path: false, plugins: [{ name: jwt }] }
      - { name: job-admin-categories, paths: ["/api/admin/categories"], strip_path: false, plugins: [{ name: jwt }] }

      - { name: job-standalone, paths: ["/api/jobs"], strip_path: false }
      - { name: job-public, paths: ["/api/public/jobs"], strip_path: false }
      - { name: job-options, paths: ["/api/options/general"], strip_path: false }

      # Metadata (private)
      - { name: job-metadata-common, paths: ["/api/metadata/common"], strip_path: false }
      - name: job-metadata-districts
        paths: ["~/api/metadata/districts/[^/]+"]
        strip_path: false

      # Metadata (public)
      - { name: job-public-metadata-common, paths: ["/api/public/metadata/common"], strip_path: false }
      - name: job-public-metadata-districts
        paths: ["~/api/public/metadata/districts/[^/]+"]
        strip_path: false

      # Company
      - name: job-company-detail
        paths: ["~/api/companies/[^/]+"]
        strip_path: false

  # ======================
  # HIRING
  # ======================
  - name: hiring-service
    url: http://hiring-service.job7189-apps.svc.cluster.local:80
    routes:
      - name: hiring-pipelines
        paths: ["~/api/workspaces/[^/]+/pipelines"]
        strip_path: false
        plugins: [{ name: jwt }]
      - { name: hiring-apply, paths: ["~/api/jobs/[^/]+/apply"], strip_path: false }
      - { name: hiring-applications, paths: ["/api/applications"], strip_path: false, plugins: [{ name: jwt }] }
      - { name: hiring-board, paths: ["/api/board"], strip_path: false, plugins: [{ name: jwt }] }

      - { name: hiring-interviews, paths: ["/api/interviews"], strip_path: false, plugins: [{ name: jwt }] }

      - name: hiring-scorecards
        paths: ["~/api/applications/[^/]%2B/scorecards"]
        strip_path: false
        regex_priority: 100
        plugins: [{ name: jwt }]

  # ======================
  # CANDIDATE
  # ======================
  - name: candidate-service
    url: http://candidate-service.job7189-apps.svc.cluster.local:80
    routes:
      - { name: candidate-resumes, paths: ["/api/resumes"], strip_path: false, plugins: [{ name: jwt }] }
      - { name: candidate-interactions, paths: ["/api/interactions"], strip_path: false, plugins: [{ name: jwt }] }

  # ======================
  # COMMUNICATION
  # ======================
  - name: communication-service
    url: http://communication-service.job7189-apps.svc.cluster.local:80
    routes:
      - { name: comm-conversations, paths: ["/api/conversations"], strip_path: false, plugins: [{ name: jwt }] }
      - { name: comm-messages, paths: ["/api/messages"], strip_path: false, plugins: [{ name: jwt }] }
      - { name: comm-notifications, paths: ["/api/notifications"], strip_path: false, plugins: [{ name: jwt }] }

      - name: comm-messages-history
        paths: ["~/api/conversations/[^/]%2B/messages"]
        strip_path: false
        regex_priority: 100
        plugins: [{ name: jwt }]

  # ======================
  # STORAGE
  # ======================
  - name: storage-service
    url: http://storage-service.job7189-apps.svc.cluster.local:80
    routes:
      - { name: storage-main, paths: ["/api/presigned-url"], strip_path: false }

# ======================================================
# 3. GLOBAL PLUGINS
# ======================================================
plugins:
  - name: cors
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      headers: ["Accept", "Authorization", "Content-Type", "Origin", "X-Requested-With"]
      credentials: true

  # --------------------------------------------------------------------
  # Prometheus exporter — PIP 7 (Observability) Phase 1.
  # Exposes per-service / per-route / per-consumer metrics at
  # GET <status_listen>/metrics (default :8100/metrics, see
  # KONG_STATUS_LISTEN in 04-kong-dbless.yaml). Prometheus auto-discovers
  # the kong-gateway pod via the `prometheus.io/scrape: "true"` annotation
  # configured on the pod template, so no per-Service ServiceMonitor is
  # required for this vanilla-Prometheus lab.
  #
  # status_code + latency + bandwidth are the metrics consumed by the
  # PR-O alert rule group `zta-l7` (request-rate, 5xx-rate, p95 latency).
  # per_consumer is enabled so we can attribute 401/403 spikes to the
  # offending JWT consumer for the Adaptive Security Loop (PIP 6).
  # --------------------------------------------------------------------
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true
      per_consumer: true

  # --------------------------------------------------------------------
  # Phase 5.B.2 — OPA user-authz gate (forwards role decisions to OPA).
  #
  # Kong runs the `jwt` plugin first (per-route) — it has already verified
  # the JWT signature against the Keycloak realm public key by the time the
  # pre-function `access` block executes. We re-decode the payload here only
  # to forward the realm-access roles to OPA; we do NOT re-verify the
  # signature.
  #
  # For routes WITHOUT a `jwt` plugin (public ones — /api/health, /api/public/*)
  # the Authorization header is usually absent, so the script falls through
  # and lets OPA decide via public.rego. If OPA is unreachable we fail-open
  # (log + allow) so a transient OPA outage doesn't brick the gateway.
  # Set ZTA_OPA_FAIL_CLOSED=1 (env on Kong pod) to flip to fail-closed.
  # --------------------------------------------------------------------
  - name: pre-function
    config:
      access:
        - |
          local cjson   = require("cjson.safe")
          local http    = require("resty.http")

          -- CORS preflight: browsers send OPTIONS without an Authorization
          -- header, so the OPA gate below would deny it (403) and the request
          -- would never reach the global `cors` plugin. This pre-function runs
          -- before `cors`, so we short-circuit here and `return` (not exit) to
          -- let the `cors` plugin answer the preflight with the proper headers.
          if kong.request.get_method() == "OPTIONS" then
            return
          end

          -- Where to ask OPA. Resolves via cluster DNS — OPA Service is
          -- `security/opa` on port 8181, deployed by scripts/zta-deploy-opa.sh.
          --
          -- The opa-kube-mgmt Helm chart (11.0.7) provisions a self-signed
          -- TLS cert (`--tls-cert-file=/certs/tls.crt`) so OPA listens on
          -- HTTPS by default. We connect via TLS but skip verification —
          -- the call never leaves the cluster (Cilium CNP `12-security.yaml`
          -- rule 8 confines the OPA Service to gateway namespace) and the
          -- chart-generated cert is not in Kong's CA bundle.
          --
          -- Constants are hardcoded because the Kong pre-function sandbox
          -- does not expose `os.getenv` by default. To override these in
          -- the future, edit this file and re-apply the kong-declarative-config
          -- ConfigMap, or extend `KONG_UNTRUSTED_LUA_SANDBOX_ENVIRONMENT` to
          -- whitelist `os.getenv`.
          local OPA_URL     = "https://opa.security.svc.cluster.local:8181/v1/data/zta/authz/allow"
          local FAIL_CLOSED = false
          local TIMEOUT_MS  = 1000   -- 1s upper bound on OPA round-trip

          local auth = kong.request.get_header("authorization") or ""
          local token = auth:match("^[Bb]earer%s+(.+)$") or ""

          -- Decode the JWT payload (base64-url segment 2) — Kong's jwt
          -- plugin already verified the signature on protected routes; we
          -- only need the claims for OPA input.
          local function b64url_decode(s)
            s = s:gsub("-", "+"):gsub("_", "/")
            local pad = 4 - (#s % 4)
            if pad < 4 then s = s .. string.rep("=", pad) end
            return ngx.decode_base64(s)
          end

          local claims = {}
          if token ~= "" then
            local _, payload_b64, _ = token:match("([^.]+)%.([^.]+)%.([^.]+)")
            if payload_b64 then
              local raw = b64url_decode(payload_b64)
              if raw then
                claims = cjson.decode(raw) or {}
              end
            end
          end

          -- Build OPA input.
          local path = ngx.var.uri or "/"
          local segments = {}
          for seg in path:gmatch("[^/]+") do
            table.insert(segments, seg)
          end

          local opa_input = {
            input = {
              method        = kong.request.get_method(),
              path          = path,
              path_segments = segments,
              jwt           = claims,
            }
          }

          local body = cjson.encode(opa_input)

          -- Call OPA.
          local httpc = http.new()
          httpc:set_timeout(TIMEOUT_MS)
          local res, err = httpc:request_uri(OPA_URL, {
            method     = "POST",
            body       = body,
            headers    = { ["Content-Type"] = "application/json" },
            ssl_verify = false,
          })

          if not res then
            kong.log.err("ZTA OPA call failed: ", err or "nil",
              " path=", path, " method=", opa_input.input.method)
            if FAIL_CLOSED then
              return kong.response.exit(503,
                { message = "authorization service unavailable" })
            end
            -- fail-open (default thesis posture: visibility > availability impact)
            return
          end

          if res.status ~= 200 then
            kong.log.err("ZTA OPA non-200: ", res.status,
              " body=", res.body or "")
            if FAIL_CLOSED then
              return kong.response.exit(503,
                { message = "authorization service error" })
            end
            return
          end

          local decoded = cjson.decode(res.body or "") or {}
          local allow = decoded.result == true

          kong.log.info("ZTA OPA decision allow=", tostring(allow),
            " user=", claims.preferred_username or "anonymous",
            " method=", opa_input.input.method, " path=", path)

          if not allow then
            return kong.response.exit(403, {
              message = "forbidden",
              reason  = "OPA denied user-authz",
              user    = claims.preferred_username or "anonymous",
              roles   = (claims.realm_access or {}).roles or {},
            })
          end