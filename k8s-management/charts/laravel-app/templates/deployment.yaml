apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-init-first: "true"
        vault.hashicorp.com/role: "{{ .Release.Name }}"
        # Skip TLS verification for Vault (cluster uses self-signed cert)
        vault.hashicorp.com/tls-skip-verify: "true"
        vault.hashicorp.com/agent-inject-status: "update"

        # Common secrets — APP_KEY
        vault.hashicorp.com/agent-inject-secret-common: "secret/data/laravel-common"
        vault.hashicorp.com/agent-inject-file-common: ".env.common"
        vault.hashicorp.com/agent-inject-template-common: |
          {{`{{- with secret "secret/data/laravel-common" -}}
          APP_KEY="{{ .Data.data.APP_KEY }}"
          {{- end }}`}}

        # Dynamic DB credentials
        vault.hashicorp.com/agent-inject-secret-db: "database/creds/{{ .Release.Name }}"
        vault.hashicorp.com/agent-inject-file-db: ".env.db"
        vault.hashicorp.com/agent-inject-template-db: |-
          {{`{{- with secret "database/creds/`}}{{ .Release.Name }}{{`" -}}
          DB_USERNAME="{{ .Data.username }}"
          DB_PASSWORD="{{ .Data.password }}"
          
          LEASE_ID="{{ .LeaseID }}"
          
          {{ end }}`}}

        # Sentinel file with lease id to signal rotation
        vault.hashicorp.com/agent-inject-file-db-lease: ".env.db.lease"
        vault.hashicorp.com/agent-inject-template-db-lease: |-
          {{`{{- with secret "database/creds/`}}{{ .Release.Name }}{{`" -}}
          LEASE_ID="{{ .LeaseID }}"
          {{- end }}`}}

        {{- if .Values.vault.extraSecret }}
        # Service-specific secrets
        vault.hashicorp.com/agent-inject-secret-extra: "secret/data/{{ .Release.Name }}"
        vault.hashicorp.com/agent-inject-file-extra: ".env.extra"
        vault.hashicorp.com/agent-inject-template-extra: |-
{{ .Values.vault.extraSecretTemplate | indent 10 }}
        {{- end }}
    spec:
      shareProcessNamespace: true
      serviceAccountName: {{ .Release.Name }}
      volumes:
      - name: app-env
        emptyDir:
          medium: Memory
      - name: pid
        emptyDir: {}
      - name: env-watcher-script
        configMap:
          name: {{ .Release.Name }}-env-watcher-script
          defaultMode: 0755
      initContainers:
      - name: wait-for-vault-secrets
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            # wait for initial Vault-injected DB secret to appear
            i=0
            while [ $i -lt 60 ]; do
              if [ -f /vault/secrets/.env.db ]; then
                echo "vault secrets ready"
                exit 0
              fi
              i=$((i+1))
              sleep 1
            done
            echo "timeout waiting for /vault/secrets/.env.db" >&2
            exit 1
        volumeMounts:
          - name: app-env
            mountPath: /app-secrets
      - name: fix-perms
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            # ensure app and watcher can write/read mounts
            chmod 0777 /app-secrets || true
            chmod 0777 /var/run || true
            exit 0
        volumeMounts:
          - name: app-env
            mountPath: /app-secrets
          - name: pid
            mountPath: /var/run
      containers:
        - name: env-loader
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Efficient watcher: only update when DB env content changes
              LAST=""
              while true; do
                if [ -f /vault/secrets/.env.db ]; then
                  SUM=$(md5sum /vault/secrets/.env.db 2>/dev/null | cut -d' ' -f1 || echo "")
                  if [ "$SUM" != "$LAST" ]; then
                    LAST="$SUM"
                    # Merge files
                    cat /vault/secrets/.env.common > /vault/secrets/.env 2>/dev/null || true
                    cat /vault/secrets/.env.db >> /vault/secrets/.env 2>/dev/null || true
                    [ -f /vault/secrets/.env.extra ] && cat /vault/secrets/.env.extra >> /vault/secrets/.env || true
                    # Atomic publish
                    cp /vault/secrets/.env /app-secrets/.env
                    chmod 644 /app-secrets/.env
                    # copy lease sentinel if present
                    if [ -f /vault/secrets/.env.db.lease ]; then
                      cp /vault/secrets/.env.db.lease /app-secrets/.env.db.lease || true
                      chmod 644 /app-secrets/.env.db.lease || true
                    fi
                    cp /app-secrets/.env /var/www/.env 2>/dev/null || true
                  fi
                fi
                sleep 10
              done
          volumeMounts:
            - name: app-env
              mountPath: /app-secrets
            - name: pid
              mountPath: /var/run

        - name: env-watcher
          image: alpine:3.18
          command:
            - sh
            - -c
            - |
              apk add --no-cache curl coreutils >/dev/null 2>&1 || true
              chmod +x /usr/local/bin/env-watcher.sh 2>/dev/null || true
              /usr/local/bin/env-watcher.sh
          env:
            - name: RELOAD_URL
              value: "http://127.0.0.1:8080/internal/reload-db"
            - name: RELOAD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-internal-reload-token
                  key: token
            - name: APP_PIDFILE
              value: "/var/run/php-fpm.pid"
            - name: VAULT_DIR
              value: "/app-secrets"
            - name: APP_DIR
              value: "/app-secrets"
          volumeMounts:
            - name: app-env
              mountPath: /app-secrets
            - name: pid
              mountPath: /var/run
            # vault-secrets is injected by the Vault mutating webhook; env-watcher reads from /app-secrets
            - name: env-watcher-script
              mountPath: /usr/local/bin/env-watcher.sh
              subPath: env-watcher.sh
              readOnly: true

        - name: app
          {{- $registry := include "registry.url" . -}}
          {{- if $registry }}
          image: "{{ $registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          volumeMounts:
          - name: app-env
            mountPath: /app-secrets
          # NOTE: Vault secrets are available at /app-secrets/.env
          # The app's docker run.sh should source or copy this file to .env
          # Or Laravel can be configured to load from this path
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            # Path to merged .env file from Vault Agent
            - name: DOTENV_PATH
              value: "/app-secrets/.env"
            - name: INTERNAL_RELOAD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-internal-reload-token
                  key: token
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "cp /app-secrets/.env /var/www/.env || true"]
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - '[ -f /app-secrets/.env ] && [ -s /app-secrets/.env ]'
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
