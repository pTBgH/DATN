apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
    {{- with .Values.zta }}
    zta.job7189/role: {{ .role | default "api" | quote }}
    zta.job7189/tier: {{ .tier | default "T2" | quote }}
    zta.job7189/env: {{ .env | default "prod" | quote }}
    zta.job7189/data-classification: {{ .dataClassification | default "internal" | quote }}
    zta.job7189/exposure: {{ .exposure | default "internal" | quote }}
    zta.job7189/team: {{ .team | default "backend" | quote }}
    {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        {{- with .Values.zta }}
        zta.job7189/role: {{ .role | default "api" | quote }}
        zta.job7189/tier: {{ .tier | default "T2" | quote }}
        zta.job7189/env: {{ .env | default "prod" | quote }}
        zta.job7189/data-classification: {{ .dataClassification | default "internal" | quote }}
        zta.job7189/exposure: {{ .exposure | default "internal" | quote }}
        zta.job7189/team: {{ .team | default "backend" | quote }}
        {{- end }}
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        # vault-agent-init runs LAST (after the spiffe-helper native sidecar has seeded the JWT-SVID)
        vault.hashicorp.com/agent-init-first: "false"
        # --- SPIRE JWT-SVID auth (replaces auth/kubernetes) ---
        vault.hashicorp.com/auth-type: "jwt"
        vault.hashicorp.com/auth-path: "auth/jwt"
        vault.hashicorp.com/auth-config-role: "{{ .Release.Name }}"
        vault.hashicorp.com/auth-config-path: "/spire-jwt/jwt_svid.token"
        vault.hashicorp.com/auth-config-remove_jwt_after_reading: "false"
        # copy the /spire-jwt mount from the spiffe-helper container into vault-agent(-init)
        vault.hashicorp.com/agent-copy-volume-mounts: "spiffe-helper"
        # Skip TLS verification for Vault (cluster uses self-signed cert)
        vault.hashicorp.com/tls-skip-verify: "true"
        vault.hashicorp.com/agent-inject-status: "update"
 
        # Common secrets — APP_KEY
        vault.hashicorp.com/agent-inject-secret-common: "secret/data/laravel-common"
        vault.hashicorp.com/agent-inject-file-common: ".env.common"
        vault.hashicorp.com/agent-inject-template-common: |
          {{`{{- with secret "secret/data/laravel-common" -}}
          APP_KEY="{{ .Data.data.APP_KEY }}"
          {{- end }}`}}
 
        # Dynamic DB credentials
        vault.hashicorp.com/agent-inject-secret-db: "database/creds/{{ .Release.Name }}"
        vault.hashicorp.com/agent-inject-file-db: ".env.db"
        vault.hashicorp.com/agent-inject-template-db: |-
          {{`{{- with secret "database/creds/`}}{{ .Release.Name }}{{`" -}}
          DB_USERNAME="{{ .Data.username }}"
          DB_PASSWORD="{{ .Data.password }}"
          
          LEASE_ID="{{ .LeaseID }}"
          
          {{ end }}`}}
 
        # Sentinel file with lease id to signal rotation
        vault.hashicorp.com/agent-inject-file-db-lease: ".env.db.lease"
        vault.hashicorp.com/agent-inject-template-db-lease: |-
          {{`{{- with secret "database/creds/`}}{{ .Release.Name }}{{`" -}}
          LEASE_ID="{{ .LeaseID }}"
          {{- end }}`}}
 
        {{- if .Values.vault.extraSecret }}
        # Service-specific secrets
        vault.hashicorp.com/agent-inject-secret-extra: "secret/data/{{ .Release.Name }}"
        vault.hashicorp.com/agent-inject-file-extra: ".env.extra"
        vault.hashicorp.com/agent-inject-template-extra: |-
{{ .Values.vault.extraSecretTemplate | indent 10 }}
        {{- end }}
    spec:
      shareProcessNamespace: true
      serviceAccountName: {{ .Release.Name }}
      volumes:
      - name: app-env
        emptyDir:
          medium: Memory
          sizeLimit: {{ .Values.appEnvTmpfsSizeLimit | quote }}
      - name: pid
        emptyDir: {}
      - name: env-watcher-script
        configMap:
          name: {{ .Release.Name }}-env-watcher-script
          defaultMode: 0755
      # SPIRE Workload API socket (CSI) + JWT-SVID output dir + spiffe-helper config
      - name: spiffe-workload-api
        csi:
          driver: csi.spiffe.io
          readOnly: true
      - name: spire-jwt
        emptyDir:
          medium: Memory
      - name: spiffe-helper-config
        configMap:
          name: {{ .Release.Name }}-spiffe-helper
      initContainers:
      # Native sidecar (k8s >=1.29): fetches JWT-SVID (aud=vault) into /spire-jwt/jwt_svid.token,
      # then keeps it refreshed for the long-running vault-agent to re-authenticate.
      - name: spiffe-helper
        image: {{ .Values.spiffeHelper.image | default "ghcr.io/spiffe/spiffe-helper@sha256:4d9863034d8f95d5b6592095b57a38828e54b4e92f66d744a6ed353f6fc0bf7f" }}
        restartPolicy: Always
        securityContext:
          runAsUser: 100
          runAsGroup: 1000
          allowPrivilegeEscalation: false
        args:
          - -config
          - /etc/spiffe-helper/helper.conf
        volumeMounts:
          - name: spiffe-helper-config
            mountPath: /etc/spiffe-helper
            readOnly: true
          - name: spiffe-workload-api
            mountPath: /spiffe-workload-api
            readOnly: true
          - name: spire-jwt
            mountPath: /spire-jwt
        resources:
{{ toYaml .Values.resources.init | indent 10 }}
      - name: fix-perms
        image: {{ .Values.initImages.busybox | default "busybox:1.36" }}
        command:
          - sh
          - -c
          - |
            # ensure app and watcher can write/read mounts
            chmod 0777 /app-secrets || true
            chmod 0777 /var/run || true
            exit 0
        volumeMounts:
          - name: app-env
            mountPath: /app-secrets
          - name: pid
            mountPath: /var/run
        resources:
{{ toYaml .Values.resources.init | indent 10 }}
      containers:
        - name: env-loader
          image: {{ .Values.initImages.busybox | default "busybox:1.36" }}
          command:
            - sh
            - -c
            - |
              # Efficient watcher: only update when DB env content changes
              LAST=""
              while true; do
                if [ -f /vault/secrets/.env.db ]; then
                  SUM=$(md5sum /vault/secrets/.env.db 2>/dev/null | cut -d' ' -f1 || echo "")
                  if [ "$SUM" != "$LAST" ]; then
                    LAST="$SUM"
                    # Merge files
                    cat /vault/secrets/.env.common > /vault/secrets/.env 2>/dev/null || true
                    cat /vault/secrets/.env.db >> /vault/secrets/.env 2>/dev/null || true
                    [ -f /vault/secrets/.env.extra ] && cat /vault/secrets/.env.extra >> /vault/secrets/.env || true
                    # Atomic publish
                    cp /vault/secrets/.env /app-secrets/.env
                    chmod 644 /app-secrets/.env
                    # copy lease sentinel if present
                    if [ -f /vault/secrets/.env.db.lease ]; then
                      cp /vault/secrets/.env.db.lease /app-secrets/.env.db.lease || true
                      chmod 644 /app-secrets/.env.db.lease || true
                    fi
                  fi
                fi
                sleep 10
              done
          volumeMounts:
            - name: app-env
              mountPath: /app-secrets
            - name: pid
              mountPath: /var/run
          resources:
{{ toYaml .Values.resources.sidecar | indent 12 }}
 
        - name: env-watcher
          image: {{ .Values.sidecarImages.envWatcher | default "alpine:3.18" }}
          command:
            - sh
            - -c
            - |
              apk add --no-cache curl coreutils >/dev/null 2>&1 || true
              chmod +x /usr/local/bin/env-watcher.sh 2>/dev/null || true
              /usr/local/bin/env-watcher.sh
          env:
            - name: RELOAD_URL
              value: "http://127.0.0.1:8000/api/internal/reload-db"
            - name: RELOAD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-internal-reload-token
                  key: token
            - name: APP_DIR
              value: "/app-secrets"
          volumeMounts:
            - name: app-env
              mountPath: /app-secrets
            - name: pid
              mountPath: /var/run
            # vault-secrets is injected by the Vault mutating webhook; env-watcher reads from /app-secrets
            - name: env-watcher-script
              mountPath: /usr/local/bin/env-watcher.sh
              subPath: env-watcher.sh
              readOnly: true
          resources:
{{ toYaml .Values.resources.sidecar | indent 12 }}
 
        - name: app
          {{- if .Values.image.fullImage }}
          image: "{{ .Values.image.fullImage }}"
          {{- else }}
          {{- $registry := include "registry.url" . -}}
          {{- if $registry }}
          image: "{{ $registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{- end }}
          {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          volumeMounts:
          - name: app-env
            mountPath: /app-secrets
          # NOTE: Vault secrets are available at /app-secrets/.env
          # The app's docker run.sh should source or copy this file to .env
          # Or Laravel can be configured to load from this path
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            # Path to merged .env file from Vault Agent
            - name: DOTENV_PATH
              value: "/app-secrets/.env"
            - name: INTERNAL_RELOAD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-internal-reload-token
                  key: token
          lifecycle:
            postStart:
              exec:
                command: ["/bin/sh", "-c", "cp /app-secrets/.env /var/www/.env || true"]
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - '[ -f /app-secrets/.env ] && [ -s /app-secrets/.env ]'
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          resources:
{{ toYaml .Values.resources.app | indent 12 }}