{{- if .Values.redis.enabled -}}
# --- Redis ServiceAccount ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-redis
  labels:
    app: {{ .Release.Name }}-redis
---
# --- Redis Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redis
  labels:
    app: {{ .Release.Name }}-redis
    zta.job7189/role: "cache"
    zta.job7189/tier: {{ .Values.zta.tier | default "T2" | quote }}
    zta.job7189/env: {{ .Values.zta.env | default "prod" | quote }}
    zta.job7189/data-classification: {{ .Values.zta.dataClassification | default "internal" | quote }}
    zta.job7189/exposure: "cluster-only"
    zta.job7189/team: {{ .Values.zta.team | default "backend" | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-redis
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-redis
        zta.job7189/role: "cache"
        zta.job7189/tier: {{ .Values.zta.tier | default "T2" | quote }}
        zta.job7189/env: {{ .Values.zta.env | default "prod" | quote }}
        zta.job7189/data-classification: {{ .Values.zta.dataClassification | default "internal" | quote }}
        zta.job7189/exposure: "cluster-only"
        zta.job7189/team: {{ .Values.zta.team | default "backend" | quote }}
    spec:
      serviceAccountName: {{ .Release.Name }}-redis
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: {{ .Values.redis.port }}
          resources:
{{ toYaml .Values.redis.resources | indent 12 }}
---
# --- Redis Service ---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
spec:
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
  selector:
    app: {{ .Release.Name }}-redis
{{- end }}