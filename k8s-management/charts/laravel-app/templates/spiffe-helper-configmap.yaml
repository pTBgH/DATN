apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-spiffe-helper
  labels:
    app: {{ .Release.Name }}
data:
  helper.conf: |
    agent_address = "/spiffe-workload-api/spire-agent.sock"
    cert_dir = "/spire-jwt"
    jwt_svids = [
      { jwt_audience = "vault", jwt_svid_file_name = "jwt_svid.token" }
    ]
    jwt_bundle_file_name = "jwt_bundle.json"