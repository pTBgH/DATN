replicaCount: 1

registry:
  # url: "docker-registry.registry.svc.cluster.local:5000"
  url: "172.17.0.1:5000"
image:
  repository: job7189/identity-service
  tag: v2.8.17
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  host: "change-me.local"

env:
  APP_ENV: production

appEnvTmpfsSizeLimit: "16Mi"

resources:
  app:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "800m"
      memory: "768Mi"
  sidecar:
    requests:
      cpu: "15m"
      memory: "24Mi"
    limits:
      cpu: "120m"
      memory: "96Mi"
  init:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "80m"
      memory: "64Mi"

# Image digests for init/sidecar images to satisfy admission policy
initImages:
  busybox: "busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662"

sidecarImages:
  envWatcher: "alpine@sha256:de0eb0b3f2a47ba1eb89389859a9bd88b28e82f5826b6969ad604979713c2d4f"

redis:
  enabled: false
  # Use digest to satisfy admission policy requiring image digests
  image: redis@sha256:d3be87a1060455213a204d2b0a7f04d45d19a16a98e85b3c37b7c33b5f0c489e
  port: 6379
  resources:
    requests:
      cpu: "25m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "192Mi"

vault:
  extraSecret: false
  extraSecretTemplate: ""
