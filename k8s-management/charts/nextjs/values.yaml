# Số lượng Pod chạy mặc định
replicaCount: 1

# Cấu hình Image mặc định (Sẽ bị ghi đè bởi file values riêng)
image:
  repository: nginx # Placeholder
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# Cấu hình Service (Mạng nội bộ K8s)
service:
  type: ClusterIP
  port: 80          # Port mà Service K8s mở ra
  targetPort: 3000  # Port mà Container Next.js đang chạy (Mặc định Next là 3000)

# Cấu hình Ingress (Tên miền) - Mặc định tắt
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Cấu hình tài nguyên (CPU/RAM) - Mặc định để trống cho Minikube dễ chạy
resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Cấu hình Autoscaling - Mặc định tắt
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# --- QUAN TRỌNG: Nơi chứa biến môi trường ---
# Để rỗng ở đây ({}), các service cụ thể sẽ điền vào file riêng của họ
env: {}
  # NODE_ENV: production
  # PORT: "3000"

# Các cấu hình nâng cao khác của K8s (Giữ nguyên mặc định)
serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

nodeSelector: {}

tolerations: []

affinity: {}