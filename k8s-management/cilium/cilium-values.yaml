# 1. Kết nối tới API Server của Kind
# Lưu ý: Thay "172.18.0.2" bằng IP thật bạn vừa lấy từ lệnh docker inspect
# k8sServiceHost: "172.22.0.3"
# k8sServicePort: 6443

ipam:
  mode: kubernetes


# 2. Cấu hình định tuyến an toàn cho VMware + Kind
routingMode: "tunnel"
tunnelProtocol: "vxlan"

# 3. Thay thế kube-proxy để tối ưu eBPF
# kubeProxyReplacement: true
kubeProxyReplacement: true

# 4. Gắn đúng vào interface ens33 để tránh loạn định tuyến SSH
# devices: "ens33"
# devices: "eth0"
# directRoutingDevice: "eth0"

# 5. Bật Hubble (Mắt thần) để quan sát traffic
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  # PR-Q (Phase 3): Bật Hubble Prometheus metrics + context labels.
  #
  # `enabled` lay tu Cilium docs (https://docs.cilium.io/en/stable/observability/metrics/).
  # `contextOptions` (sourceContext, destinationContext, labelsContext) la BAT BUOC
  # cho alerts trong `infras/k8s-yaml/prometheus-rules.yaml`:
  #   - ZTACiliumCrossTierDropSpike (source_namespace, destination_namespace)
  #   - ZTAHubbleDNSExfilSuspect    (source_namespace, source workload + query length)
  #   - ZTAHubbleEgressToThreatCIDR (source_namespace + destination = reserved:world)
  #
  # Mac dinh chart KHONG export `source_namespace` etc — chi co `protocol` + `reason`.
  # labelsContext promote chung len metric label de Prometheus group/filter duoc.
  #
  # Port mac dinh: 9965 (cilium-agent). Annotation `prometheus.io/port: 9965` duoc
  # them o `prometheus.io/scrape: true` cua DS cilium-agent — Prom scrape qua
  # job `kubernetes-pods` (xem `infras/k8s-yaml/08-prometheus.yaml`).
  metrics:
    enableOpenMetrics: false
    port: 9965
    enabled:
    - "dns:query;ignoreAAAA;labelsContext=source_namespace,source_pod,source_workload,destination_namespace,traffic_direction"
    - "drop:sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity;labelsContext=source_namespace,source_pod,source_workload,destination_namespace,destination_pod,destination_workload,traffic_direction"
    - "tcp:labelsContext=source_namespace,destination_namespace,traffic_direction"
    - "flow:labelsContext=source_namespace,destination_namespace,traffic_direction"
    - "icmp:labelsContext=source_namespace,destination_namespace,traffic_direction"
    - "http:labelsContext=source_namespace,destination_namespace,traffic_direction"
    # serviceMonitor disabled - ta scrape qua Prom kubernetes_sd_configs:role=pod
    # voi annotation `prometheus.io/scrape: true` + `prometheus.io/port: 9965` —
    # khong can ServiceMonitor CRD (Prom Operator).
    serviceMonitor:
      enabled: false

# 6. Tắt IPv6 để hệ thống gọn nhẹ, tránh xung đột
ipv6:
  enabled: false

# 7. Hỗ trợ Operator (Quản lý các tài nguyên Cilium)
operator:
  replicas: 1
  # Diag tháng 4/2026 ghi nhận cilium-operator restart 34 lần trong 3h. Events
  # cho thấy Readiness probe failed: Get http://127.0.0.1:9234/healthz → EOF
  # (probe đến chính pod, không lỗi network) → process không kịp respond
  # trong 1s. Nới timeout + failureThreshold giảm false-positive khi CPU
  # bão hoà; resource request đẩy QoS sang Burstable.
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  # Ép 2 Pod Operator phải nằm trên 2 Node vật lý khác nhau (Anti-Affinity)
#  affinity:
 #   podAntiAffinity:
  #    requiredDuringSchedulingIgnoredDuringExecution:
   #   - labelSelector:
    #      matchExpressions:
     #     - key: io.cilium/app
      #      operator: In
       #     values:
        #    - operator
        #topologyKey: "kubernetes.io/hostname"

gatewayAPI:
  enabled: true
