releases:  
  # Identity
  - name: identity-service
    namespace: job7189-apps
    chart: ./charts/laravel-app
    values:
      - values/laravel-common-values.yaml
      - values/identity-values.yaml
      - { internalReloadToken: "another-really-secure-token", image: { registry: "localhost:5000", repository: "job7189/identity-service", tag: "v2.8.16", pullPolicy: "Always" } }

  # Workspace (Thay cho Company)
  - name: workspace-service
    namespace: job7189-apps
    chart: ./charts/laravel-app
    values:
      - values/laravel-common-values.yaml
      - values/workspace-values.yaml

  # Job
  - name: job-service
    namespace: job7189-apps
    chart: ./charts/laravel-app
    values:
      - values/laravel-common-values.yaml
      - values/job-values.yaml

  # Hiring Service
  - name: hiring-service
    namespace: job7189-apps
    chart: ./charts/laravel-app
    values:
      - values/laravel-common-values.yaml
      - values/hiring-values.yaml

  # Candidate
  - name: candidate-service
    namespace: job7189-apps
    chart: ./charts/laravel-app
    values:
      - values/laravel-common-values.yaml
      - values/candidate-values.yaml

  # Communication (Chat & Email)
  - name: communication-service
    namespace: job7189-apps
    chart: ./charts/laravel-app
    values:
      - values/laravel-common-values.yaml
      - values/communication-values.yaml

  # Storage Utility
  - name: storage-service
    namespace: job7189-apps
    chart: ./charts/laravel-app
    values:
      - values/laravel-common-values.yaml
      - values/storage-values.yaml

# Frontend (fe_candidate / fe_recruiter) đã được tách ra khỏi pipeline ZTA.
# Repo giữ thư mục `frontend/` ở root cho dev cục bộ; KHÔNG build/deploy
# trong cluster ZTA. Xem doc/cleanup-workspace-plan.md (PR-C).
