replicaCount: 1

internalReloadToken: "job-secure-reload-token-67890"

image:
  repository: job7189/job-service
  fullImage: "100.74.189.43:5443/job7189/job@sha256:bbac84f348e6da99d1b2475d7556e8df865e8483de5d7bc63c9fd37c2b2b0bc3"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  host: "job.job7189.local"

redis:
  enabled: true

env:
  APP_NAME: "Job7189 Job Service"
  DB_CONNECTION: mysql
  DB_HOST: mysql.data.svc.cluster.local
  DB_PORT: "3306"
  DB_DATABASE: job7189_job_db
  CACHE_DRIVER: "redis"
  REDIS_HOST: "job-service-redis"
  REDIS_PORT: "6379"
  CACHE_PREFIX: job_
  LOG_CHANNEL: "stderr"
  LOG_LEVEL: "info"

vault:
  role: job-service
  extraSecret: false
  secretTemplate: |
    {{- with secret "database/creds/job-service" -}}
    DB_USERNAME="{{ .Data.username }}"
    DB_PASSWORD="{{ .Data.password }}"
    LEASE_ID="{{ .Data.lease_id }}"
    {{- end }}

zta:
  role: api
  tier: T2
  env: prod
  dataClassification: internal
  exposure: internal
  team: backend
