registry:
  # Kind nodes pull backend images directly from host local registry.
  url: "172.17.0.1:5000"

env:
  # APP_NAME: Job7189
  # ⚠️ NOTE: APP_KEY, secrets, and passwords are injected by Vault Agent
  # See: vault.hashicorp.com/agent-inject annotations in deployment.yaml
  
  APP_ENV: production
  APP_DEBUG: "false"
  # APP_KEY will be injected by Vault Agent from secret/data/laravel-common
  
  APP_LOCALE: en
  APP_FALLBACK_LOCALE: en
  APP_FAKER_LOCALE: en_US
  
  APP_MAINTENANCE_DRIVER: file
  
  PHP_CLI_SERVER_WORKERS: 1
  BCRYPT_ROUNDS: 12

  LOG_CHANNEL: "stderr"
  LOG_STACK: single
  LOG_DEPRECATIONS_CHANNEL: null
  LOG_LEVEL: info
  
  PAGINATION_SIZE: 10

  BROADCAST_CONNECTION: log
  FILESYSTEM_DISK: local
  QUEUE_CONNECTION: redis

  SESSION_DRIVER: database
  SESSION_LIFETIME: 120
  SESSION_ENCRYPT: false
  SESSION_PATH: /
  SESSION_DOMAIN: null

  CACHE_STORE: redis

  REDIS_CLIENT: phpredis
  REDIS_PASSWORD: null
  REDIS_PORT: 6379

  KAFKA_BROKERS: "kafka-0.kafka-svc.data.svc.cluster.local:9092"

  KEYCLOAK_REALM: "job7189"
  KEYCLOAK_BASE_URL: "http://keycloak.security.svc.cluster.local:8080"
  KEYCLOAK_RECRUITER_CLIENT_ID: "recruiter-app-dev"
  KEYCLOAK_CANDIDATE_CLIENT_ID: "candidate-app-dev"

internalReloadToken: ""

# Keep the tmpfs secrets mount bounded to avoid unbounded memory growth.
appEnvTmpfsSizeLimit: "16Mi"

resources:
  # Diag tháng 4/2026 ghi nhận hiring-service container app bị OOMKilled
  # (exit 137) trong khi 6 microservice còn lại đang flap với exit 131/143
  # (SIGQUIT/SIGTERM khi pod được replace). Bump memory limit từ 384Mi → 640Mi
  # cho app container giúp PHP-FPM + Octane workers chịu được peak khi job
  # warm cache + worker queue cùng chạy. CPU limit 400m → 600m để xử lý burst
  # khi cluster vừa khôi phục sau cascade và queue dồn lại.
  app:
    requests:
      cpu: "150m"
      memory: "192Mi"
    limits:
      cpu: "600m"
      memory: "640Mi"
  sidecar:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "80m"
      memory: "64Mi"
  init:
    requests:
      cpu: "5m"
      memory: "8Mi"
    limits:
      cpu: "40m"
      memory: "32Mi"

redis:
  resources:
    requests:
      cpu: "25m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "192Mi"

vault:
  # Enables per-service secrets injection
  extraSecret: false
  extraSecretTemplate: |
    {{- with secret "secret/data/keycloak" -}}
    KEYCLOAK_RECRUITER_CLIENT_SECRET={{ .Data.data.recruiter-client-secret }}
    KEYCLOAK_CANDIDATE_CLIENT_SECRET={{ .Data.data.candidate-client-secret }}
    {{- end }}
