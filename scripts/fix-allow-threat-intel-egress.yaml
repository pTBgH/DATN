# =============================================================================
# FIX: allow-threat-intel-egress — L4 Bypass DNS Proxy Fallback
#
# ROOT CAUSE: In this cluster's virtualized environment, Cilium's L7 DNS proxy
# (Envoy) encounters a UDP checksum offloading / kernel redirect bug, causing
# all intercepted UDP DNS queries to time out.
#
# SOLUTION: Avoid L7 DNS interception entirely. We:
#   1. Remove `rules.dns` from port 53 (using L4-only DNS egress to CoreDNS).
#   2. Replace `toFQDNs` with `toEntities: [world]` on port 443.
#
# This allows the threat-intel container to resolve DNS successfully via L4
# and securely pull blocklists from GitHub/abuse.ch over port 443.
# =============================================================================
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-threat-intel-egress
  namespace: security-cdm
spec:
  endpointSelector:
    matchLabels:
      app: threat-intel-refresh
  egress:
  # DNS (L4-only to bypass Cilium L7 Envoy Proxy UDP checksum bug)
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - {port: "53", protocol: UDP}
      - {port: "53", protocol: TCP}
  # Egress to external world for feed downloads (port 443)
  - toEntities: [world]
    toPorts:
    - ports:
      - {port: "443", protocol: TCP}
  # K8s API (kubectl apply ConfigMap / patch CIDRGroup + sinkhole)
  - toEntities: [kube-apiserver, host, remote-node]
    toPorts:
    - ports:
      - {port: "443", protocol: TCP}
      - {port: "6443", protocol: TCP}
  - toCIDR: ["10.96.0.0/12", "172.18.0.0/16"]
    toPorts:
    - ports:
      - {port: "443", protocol: TCP}
      - {port: "6443", protocol: TCP}
